# Định nghĩa các dịch vụ (container) sẽ chạy
services:

  # 1. Dịch vụ ứng dụng Spring Boot
  app:
    # Sử dụng image đã build
    build:
      context: .
      dockerfile: Dockerfile
    image: fisport-image
    # Đặt tên container cho dễ quản lý
    container_name: fisport-app
    # Ánh xạ cổng: Mở cổng 8080 của máy thật và trỏ vào 8080 của container
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  # 2. Dịch vụ Database
  mysql:
    image: mysql:8.0
    container_name: fisport-db
    # [!!!] Cấu hình cho Database
    environment:
      MYSQL_DATABASE: fisport
      MYSQL_ROOT_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
    ports:
      - '3307:3306'
    # Kiểm tra sức khỏe: Chờ đến khi MySQL sẵn sàng nhận kết nối
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

# Định nghĩa volume (nơi lưu trữ dữ liệu DB)
volumes:
  mysql_data: