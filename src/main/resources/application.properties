spring.application.name=Fisport
spring.datasource.url=jdbc:mysql://localhost:3306/fisport?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
# EMAIL SENDER
spring.mail.from=dattqde181019@fpt.edu.vn
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dattqde181019@fpt.edu.vn
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
endpoint.confirmUser=http:/localhost:8080/confirm
endpoint.endPointResetPassword=http:/localhost:8080/api/auth/reset-password
app.token.expiry-minutes:10
# C?u hěnh Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
# C?u hěnh static resources
spring.web.resources.static-locations=classpath:/static/
logging.level.org.thymeleaf=DEBUG
logging.level.nz.net.ultraq.thymeleaf=DEBUG