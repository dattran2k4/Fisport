<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin/admin}" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sân</title>
    <style>
        .user-table-card {
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: box-shadow 0.3s;
        }

        .user-table-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .search-bar {
            border-radius: 0.75rem;
            background: #f8f9fa;
            padding: 1.5rem;
        }

        .table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            padding: 1rem;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .badge-role {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 600;
        }

        .badge-active {
            background: #d4edda;
            color: #155724;
        }

        .badge-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 2rem 2rem;
        }

        .stat-card {
            border-radius: 1rem;
            padding: 1.5rem;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .icon-users {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .icon-active {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .icon-new {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .search-input {
            border-radius: 50px;
            border: 2px solid #e9ecef;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-search {
            border-radius: 50px;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: 600;
            transition: transform 0.3s;
        }

        .btn-search:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .action-buttons .btn {
            border-radius: 50px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 4rem;
            color: #dee2e6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="page-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h1 class="display-6 fw-bold mb-2">
                        <i class="bi bi-building me-2"></i>
                        Quản lý sân bóng
                    </h1>
                    <p class="mb-0 opacity-75">Quản lý và chỉnh sửa trạng thái các sân bóng trong hệ thống</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container pb-5">

        <!-- Search & Filter -->
        <div class="search-bar mb-4">
            <form th:action="@{/admin/fields}" method="get" class="row g-3 align-items-center">
                <div class="col-md-6">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"
                              style="border-radius: 50px 0 0 50px; border: 2px solid #e9ecef; border-right: none;">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" name="keyword" th:value="${keyword}"
                               class="form-control search-input border-start-0"
                               placeholder="Tìm kiếm theo tên sân..." style="border-left: none; padding-left: 0;">
                    </div>
                </div>

                <div class="col-md-3">
                    <select name="statusFilter" class="form-select rounded-pill">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="ACTIVE" th:selected="${statusFilter == 'ACTIVE'}">Hoạt động</option>
                        <option value="PENDING" th:selected="${statusFilter == 'PENDING'}">Chờ duyệt</option>
                        <option value="INACTIVE" th:selected="${statusFilter == 'INACTIVE'}">Ngừng hoạt động</option>
                    </select>
                </div>

                <div class="col-md-3 d-grid">
                    <button class="btn btn-primary btn-search" type="submit">
                        <i class="bi bi-search me-2"></i>Tìm kiếm
                    </button>
                </div>
            </form>
        </div>

        <!-- Field Table -->
        <div class="user-table-card bg-white">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                    <tr>
                        <th style="border-radius: 1rem 0 0 0;">ID</th>
                        <th>Tên sân</th>
                        <th>Địa chỉ</th>
                        <th>Loại sân</th>
                        <th>Giờ mở cửa</th>
                        <th>Trạng thái</th>
                        <th style="border-radius: 0 1rem 0 0;">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="f : ${fields}">
                        <td class="align-middle">
                            <span class="badge bg-light text-dark" th:text="${f.id}"></span>
                        </td>
                        <td class="align-middle fw-semibold" th:text="${f.name}">Sân ABC</td>
                        <td class="align-middle" th:text="${f.address}">Địa chỉ</td>
                        <td class="align-middle" th:text="${f.fieldTypeResponse.name}">Sân 5 người</td>
                        <td class="align-middle">
                            <i class="bi bi-clock text-muted me-1"></i>
                            <span th:text="${#temporals.format(f.openTime, 'HH:mm')} + ' - ' + ${#temporals.format(f.closeTime, 'HH:mm')}">06:00 - 22:00</span>
                        </td>

                        <!-- STATUS -->
                        <td class="align-middle">
                            <span th:switch="${f.status}">
                                <span th:case="${T(com.Fisport.common.EFieldStatus).ACTIVE}"
                                      class="badge bg-success">Hoạt động</span>
                                <span th:case="${T(com.Fisport.common.EFieldStatus).PENDING}"
                                      class="badge bg-warning text-dark">Chờ duyệt</span>
                                <span th:case="${T(com.Fisport.common.EFieldStatus).INACTIVE}"
                                      class="badge bg-danger">Ngừng hoạt động</span>
                                <span th:case="*">Không xác định</span>
                            </span>
                        </td>

                        <!-- ACTIONS -->
                        <td class="align-middle">
                            <div class="d-flex gap-2">
                                <form th:action="@{/admin/fields/change-status}" method="post" style="display:inline-block;">
                                    <input type="hidden" name="id" th:value="${f.id}" />
                                    <select name="status" class="form-select form-select-sm rounded-pill d-inline w-auto">
                                        <option th:selected="${f.status == T(com.Fisport.common.EFieldStatus).ACTIVE}"
                                                value="ACTIVE">ACTIVE</option>
                                        <option th:selected="${f.status == T(com.Fisport.common.EFieldStatus).PENDING}"
                                                value="PENDING">PENDING</option>
                                        <option th:selected="${f.status == T(com.Fisport.common.EFieldStatus).INACTIVE}"
                                                value="INACTIVE">INACTIVE</option>
                                    </select>
                                    <button class="btn btn-sm btn-outline-primary rounded-pill ms-2" type="submit">
                                        Lưu
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(fields)}">
                        <td colspan="7" class="border-0">
                            <div class="empty-state">
                                <div class="empty-state-icon"><i class="bi bi-inbox"></i></div>
                                <h5 class="text-muted">Không tìm thấy sân nào</h5>
                                <p class="text-muted">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
