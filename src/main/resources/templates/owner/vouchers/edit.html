<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Voucher</title>
</head>
<body>
<div th:fragment="content" class="p-6">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <style>
        :where([class^="ri-"])::before {
            content: "\f3c2";
        }
    </style>

    <!-- Breadcrumb -->
    <div class="mb-6">
        <div class="flex items-center gap-2 text-sm text-gray-600 mb-4">
            <a href="/owner/vouchers" class="hover:text-blue-600 transition-colors">Quản lý Vouchers</a>
            <i class="ri-arrow-right-s-line text-xs"></i>
            <span class="text-gray-900 font-semibold">Chỉnh sửa voucher</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Chỉnh sửa voucher</h1>
        <p class="text-gray-600">Cập nhật thông tin voucher của bạn</p>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start">
        <i class="ri-error-warning-fill text-red-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-red-800" th:text="${errorMessage}"></span>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form id="edit-voucher-form" method="post" class="space-y-6">
            
            <!-- Code and Description -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="code" class="block text-sm font-semibold text-gray-700 mb-2">
                        Mã voucher <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        id="code"
                        name="code"
                        th:value="${voucherRequest != null ? voucherRequest.code : ''}"
                        required
                        maxlength="20"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm uppercase"
                    >
                    <p class="mt-2 text-xs text-gray-500">
                        <i class="ri-information-line mr-1"></i>
                        Mã sẽ được tự động chuyển thành chữ hoa
                    </p>
                </div>

                <div>
                    <label for="discount" class="block text-sm font-semibold text-gray-700 mb-2">
                        Giảm giá (%) <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="number"
                        id="discount"
                        name="discount"
                        th:value="${voucherRequest != null ? voucherRequest.discount : ''}"
                        required
                        min="1"
                        max="100"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                    >
                    <p class="mt-2 text-xs text-gray-500">
                        <i class="ri-information-line mr-1"></i>
                        Phần trăm giảm giá (1-100%)
                    </p>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">
                    Mô tả
                </label>
                <textarea
                    id="description"
                    name="description"
                    th:text="${voucherRequest != null ? voucherRequest.description : ''}"
                    placeholder="Nhập mô tả về voucher..."
                    rows="3"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                ></textarea>
            </div>

            <!-- Dates -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="startDate" class="block text-sm font-semibold text-gray-700 mb-2">
                        Ngày bắt đầu <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="date"
                        id="startDate"
                        name="startDate"
                        th:value="${voucherRequest != null ? voucherRequest.startDate : ''}"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                    >
                </div>

                <div>
                    <label for="endDate" class="block text-sm font-semibold text-gray-700 mb-2">
                        Ngày kết thúc <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="date"
                        id="endDate"
                        name="endDate"
                        th:value="${voucherRequest != null ? voucherRequest.endDate : ''}"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                    >
                </div>
            </div>

            <!-- Limit -->
            <div>
                <label for="limit" class="block text-sm font-semibold text-gray-700 mb-2">
                    Giới hạn số lượng
                </label>
                <input
                    type="number"
                    id="limit"
                    name="limit"
                    th:value="${voucherRequest != null ? voucherRequest.limit : ''}"
                    placeholder="Để trống nếu không giới hạn"
                    min="1"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                >
                <p class="mt-2 text-xs text-gray-500">
                    <i class="ri-information-line mr-1"></i>
                    Số lượng người có thể sử dụng voucher này
                </p>
            </div>

            <!-- Form Actions -->
            <div class="flex items-center justify-between pt-6 border-t border-gray-200">
                <button type="button" 
                        onclick="confirmDelete()"
                        class="px-6 py-3 border border-red-300 text-red-600 rounded-xl hover:bg-red-50 transition-colors text-sm font-medium">
                    <i class="ri-delete-bin-line mr-2"></i>
                    Xóa voucher
                </button>
                <div class="flex items-center gap-4">
                    <a href="/owner/vouchers" 
                       class="px-6 py-3 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium">
                        Hủy
                    </a>
                    <button type="submit" 
                            class="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl hover:from-blue-700 hover:to-blue-800 transition-all shadow-lg hover:shadow-xl text-sm font-medium">
                        <i class="ri-save-line mr-2"></i>
                        Lưu thay đổi
                    </button>
                </div>
            </div>
        </form>
    </div>

<script th:inline="javascript">
    const voucherId = /*[[${voucherId}]]*/ '';
    
    function confirmDelete() {
        if (confirm('Bạn có chắc chắn muốn xóa voucher này?')) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/owner/vouchers/delete/' + voucherId;
            document.body.appendChild(form);
            form.submit();
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('edit-voucher-form');
        const codeInput = document.getElementById('code');
        const discountInput = document.getElementById('discount');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');

        codeInput.focus();
        codeInput.select();

        // Convert code to uppercase
        codeInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });

        form.addEventListener('submit', function(e) {
            const code = codeInput.value.trim();
            const discount = parseInt(discountInput.value);
            const startDate = new Date(startDateInput.value);
            const endDate = new Date(endDateInput.value);
            
            if (!code || code.length < 3) {
                e.preventDefault();
                alert('Mã voucher phải có ít nhất 3 ký tự');
                return false;
            }

            if (!discount || discount < 1 || discount > 100) {
                e.preventDefault();
                alert('Giảm giá phải từ 1% đến 100%');
                return false;
            }

            if (startDate >= endDate) {
                e.preventDefault();
                alert('Ngày kết thúc phải sau ngày bắt đầu');
                return false;
            }
        });
    });
</script>
</body>
</html>
