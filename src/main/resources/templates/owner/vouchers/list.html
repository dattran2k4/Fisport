<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Vouchers</title>
</head>
<body>
<div th:fragment="content" class="px-6 py-4">
    <!-- Load Tailwind CSS and Remixicon -->
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <style>
        .voucher-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .voucher-card:hover {
            transform: translateY(-4px);
        }
        
        .card-icon {
            transition: transform 0.3s ease;
        }
        
        .voucher-card:hover .card-icon {
            transform: scale(1.1);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <!-- Alert messages -->
    <div th:if="${successMessage}" class="mb-4 p-4 bg-green-50 border-l-4 border-green-500 rounded-lg flex items-start">
        <i class="ri-checkbox-circle-fill text-green-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-green-800" th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start">
        <i class="ri-error-warning-fill text-red-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-red-800" th:text="${errorMessage}"></span>
    </div>

    <!-- Action Button -->
    <div class="mb-6 flex justify-end">
        <a href="/owner/vouchers/create" 
           class="inline-flex items-center px-5 py-2.5 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-medium rounded-lg hover:from-blue-700 hover:to-blue-800 transition-all shadow-md hover:shadow-lg">
            <i class="ri-add-line mr-2 text-lg"></i>
            Thêm voucher mới
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-1">Tổng vouchers</p>
                    <p class="text-2xl font-bold text-gray-900" th:text="${vouchers.size()}">0</p>
                </div>
                <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                    <i class="ri-ticket-line text-xl text-blue-600"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-1">Đang hoạt động</p>
                    <p class="text-2xl font-bold text-green-900" th:text="${#lists.size(vouchers.?[status.name() == 'ACTIVE'])}">0</p>
                </div>
                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                    <i class="ri-check-double-line text-xl text-green-600"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-1">Không hoạt động</p>
                    <p class="text-2xl font-bold text-gray-900" th:text="${#lists.size(vouchers.?[status.name() == 'INACTIVE'])}">0</p>
                </div>
                <div class="w-12 h-12 bg-gray-100 rounded-lg flex items-center justify-center">
                    <i class="ri-pause-circle-line text-xl text-gray-600"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
        <div class="relative">
            <input type="text" 
                   id="searchInput"
                   placeholder="Tìm kiếm voucher..." 
                   class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
            <i class="ri-search-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${vouchers.isEmpty()}" class="bg-white rounded-xl shadow-sm border border-gray-100 p-12 text-center">
        <div class="w-20 h-20 bg-gradient-to-br from-blue-100 to-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="ri-inbox-line text-4xl text-blue-500"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Chưa có voucher nào</h3>
        <p class="text-gray-600 mb-6 max-w-md mx-auto">Hãy bắt đầu bằng cách thêm voucher đầu tiên cho khách hàng của bạn.</p>
        <a href="/owner/vouchers/create" 
           class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold rounded-lg hover:from-blue-700 hover:to-blue-800 transition-all shadow-md hover:shadow-lg">
            <i class="ri-add-line mr-2 text-lg"></i>
            Thêm voucher đầu tiên
        </a>
    </div>

    <!-- Vouchers Grid -->
    <div th:if="${!vouchers.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" id="vouchersGrid">
        <div th:each="voucher : ${vouchers}"
             class="voucher-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md">
            <div class="p-6">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="w-10 h-10 bg-gradient-to-br from-purple-100 to-purple-200 rounded-lg flex items-center justify-center card-icon">
                                <i class="ri-ticket-line text-lg text-purple-600"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-lg text-gray-900" th:text="${voucher.code}">CODE</h3>
                            </div>
                        </div>
                        <p class="text-sm text-gray-600 line-clamp-2" th:text="${voucher.description ?: 'Không có mô tả'}">Mô tả</p>
                    </div>
                    <span th:if="${voucher.status.name() == 'ACTIVE' && voucher.endDate.isAfter(T(java.time.LocalDate).now())}" 
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        <span class="w-1.5 h-1.5 bg-green-600 rounded-full mr-1.5"></span>
                        Hoạt động
                    </span>
                    <span th:if="${voucher.status.name() == 'ACTIVE' && !voucher.endDate.isAfter(T(java.time.LocalDate).now())}" 
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-orange-100 text-orange-800">
                        <span class="w-1.5 h-1.5 bg-orange-600 rounded-full mr-1.5"></span>
                        Hết hạn
                    </span>
                    <span th:if="${voucher.status.name() == 'INACTIVE'}" 
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                        <span class="w-1.5 h-1.5 bg-red-600 rounded-full mr-1.5"></span>
                        Không hoạt động
                    </span>
                </div>

                <div class="space-y-3 mb-4">
                    <div class="flex items-center justify-between py-2 border-t border-gray-100">
                        <span class="text-sm text-gray-600">Giảm giá:</span>
                        <span class="text-sm font-semibold text-purple-600" th:text="${voucher.discount} + '%'">0%</span>
                    </div>
                    <div class="flex items-center justify-between py-2 border-t border-gray-100">
                        <span class="text-sm text-gray-600">Giới hạn:</span>
                        <span class="text-sm font-semibold text-gray-900" th:text="${voucher.limit ?: 'Không giới hạn'}">0</span>
                    </div>
                    <div class="flex items-center justify-between py-2 border-t border-gray-100">
                        <span class="text-sm text-gray-600">Đã dùng:</span>
                        <span class="text-sm font-semibold text-gray-900" th:text="${voucher.usedCount}">0</span>
                    </div>
                    <div class="flex items-center justify-between py-2 border-t border-gray-100">
                        <span class="text-sm text-gray-600">Hết hạn:</span>
                        <span class="text-sm font-medium text-gray-900" th:text="${#temporals.format(voucher.endDate, 'dd/MM/yyyy')}">31/12/2024</span>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-2 pt-4 border-t border-gray-200">
                    <a th:href="@{/owner/vouchers/edit/{id}(id=${voucher.id})}" 
                       class="flex-1 flex items-center justify-center p-2 text-blue-600 hover:bg-blue-50 rounded transition-colors">
                        <i class="ri-edit-line text-sm mr-1"></i>
                        <span class="text-sm">Sửa</span>
                    </a>
                    <form th:action="@{/owner/vouchers/delete/{id}(id=${voucher.id})}" 
                          method="post" 
                          style="flex: 1; margin: 0;"
                          onsubmit="return confirm('Bạn có chắc chắn muốn xóa voucher này?');">
                        <button type="submit" 
                                class="w-full flex items-center justify-center p-2 text-red-500 hover:bg-red-50 rounded transition-colors">
                            <i class="ri-delete-bin-line text-sm mr-1"></i>
                            <span class="text-sm">Xóa</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Search functionality
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const voucherCards = document.querySelectorAll('.voucher-card');
        
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                voucherCards.forEach(card => {
                    const text = card.textContent.toLowerCase();
                    if (text.includes(searchTerm)) {
                        card.style.display = '';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }
    });
</script>
</body>
</html>
