<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Services</title>
</head>
<body>
<div th:fragment="content" class="px-6 py-4">
    <!-- Load Tailwind CSS and Remixicon -->
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <style>
        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .service-card:hover {
            transform: translateY(-4px);
        }
        
        .service-card:hover .card-icon {
            transform: scale(1.1);
        }
        
        .card-icon {
            transition: transform 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <!-- Alert messages -->
    <div th:if="${successMessage}" class="mb-4 p-4 bg-green-50 border-l-4 border-green-500 rounded-lg flex items-start">
        <i class="ri-checkbox-circle-fill text-green-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-green-800" th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start">
        <i class="ri-error-warning-fill text-red-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-red-800" th:text="${errorMessage}"></span>
    </div>

    <!-- Action Button -->
    <div class="mb-6 flex justify-end">
        <a href="/owner/services/create" 
           class="inline-flex items-center px-5 py-2.5 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-medium rounded-lg hover:from-blue-700 hover:to-blue-800 transition-all shadow-md hover:shadow-lg">
            <i class="ri-add-line mr-2 text-lg"></i>
            Thêm loại dịch vụ
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-1">Tổng loại dịch vụ</p>
                    <p class="text-2xl font-bold text-gray-900" th:text="${services.size()}">0</p>
                </div>
                <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                    <i class="ri-service-line text-xl text-blue-600"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-1">Tổng sản phẩm</p>
                    <p class="text-2xl font-bold text-gray-900" th:text="${totalItems}">0</p>
                </div>
                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                    <i class="ri-stack-line text-xl text-green-600"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-1">Trung bình/loại</p>
                    <p class="text-2xl font-bold text-gray-900" th:text="${#numbers.formatDecimal(averageItems, 1, 1)}">0.0</p>
                    <p class="text-xs text-gray-500 mt-1">sản phẩm</p>
                </div>
                <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                    <i class="ri-pie-chart-line text-xl text-purple-600"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
        <div class="relative">
            <input type="text" 
                   id="searchInput"
                   placeholder="Tìm kiếm loại dịch vụ..." 
                   class="w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
            <i class="ri-search-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${services.isEmpty()}" class="bg-white rounded-xl shadow-sm border border-gray-100 p-12 text-center">
        <div class="w-20 h-20 bg-gradient-to-br from-blue-100 to-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="ri-inbox-line text-4xl text-blue-500"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Chưa có loại dịch vụ nào</h3>
        <p class="text-gray-600 mb-6 max-w-md mx-auto">Hãy bắt đầu bằng cách thêm loại dịch vụ đầu tiên cho sân của bạn.</p>
        <a href="/owner/services/create" 
           class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold rounded-lg hover:from-blue-700 hover:to-blue-800 transition-all shadow-md hover:shadow-lg">
            <i class="ri-add-line mr-2 text-lg"></i>
            Thêm loại dịch vụ đầu tiên
        </a>
    </div>
    <!-- Services Grid -->
    <div th:if="${!services.isEmpty()}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5" id="servicesGrid">
        <a th:each="service : ${services}"
           th:href="@{/owner/services/{id}/items(id=${service.id})}"
           class="service-card bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-lg cursor-pointer block overflow-hidden group">
            <div class="p-5">
                <!-- Icon with gradient background -->
                <div class="card-icon relative mb-5">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center mx-auto shadow-md">
                        <i class="ri-service-line text-3xl text-white"></i>
                    </div>
                    <div class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 rounded-full border-3 border-white"></div>
                </div>

                <!-- Service Name -->
                <h3 class="font-bold text-gray-900 text-center mb-3 text-lg group-hover:text-blue-600 transition-colors"
                    th:text="${service.name}">Tên loại dịch vụ</h3>

                <!-- Product Count Badge -->
                <div class="flex justify-center mb-4">
                    <span class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold bg-gradient-to-r from-blue-50 to-purple-50 text-blue-700 border border-blue-200">
                        <i class="ri-stack-line mr-1.5"></i>
                        <span th:text="${service.serviceItems != null ? service.serviceItems.size() : 0}">0</span>

                          <span class="ml-1">sản phẩm</span>
                    </span>
                </div>
                
                <!-- Actions -->
                <div class="flex items-center gap-2 pt-4 border-t border-gray-100">
                    <a th:href="@{/owner/services/edit/{id}(id=${service.id})}" 
                       class="flex-1 flex items-center justify-center gap-1.5 py-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors font-medium text-sm"
                       onclick="event.stopPropagation()">
                        <i class="ri-edit-line"></i>
                        <span>Sửa</span>
                    </a>
                    <button th:onclick="|event.stopPropagation(); deleteService(${service.id})|" 
                            class="flex-1 flex items-center justify-center gap-1.5 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors font-medium text-sm">
                        <i class="ri-delete-bin-line"></i>
                        <span>Xóa</span>
                    </button>
                </div>
            </div>
        </a>
    </div>
</div>

<script>
    // Search functionality
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const serviceCards = document.querySelectorAll('.service-card');
        
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                
                serviceCards.forEach(card => {
                    const serviceName = card.querySelector('h3').textContent.toLowerCase();
                    if (serviceName.includes(searchTerm)) {
                        card.style.display = '';
                        card.style.animation = 'fadeIn 0.3s ease-in';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        }
    });
    
    // Delete functionality
    function deleteService(serviceId) {
        const confirmed = confirm('⚠️ Bạn có chắc chắn muốn xóa loại dịch vụ này?\n\nTất cả sản phẩm thuộc loại này cũng sẽ bị xóa vĩnh viễn.');
        
        if (confirmed) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/owner/services/delete/' + serviceId;
            document.body.appendChild(form);
            form.submit();
        }
    }
</script>
</div>
</body>
</html>
