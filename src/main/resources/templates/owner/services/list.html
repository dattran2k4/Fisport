<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Services</title>
</head>
<body>
<div th:fragment="content" class="px-6 py-4 font-inter">
    <!-- Load Tailwind CSS and Remixicon -->
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <style>
        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .service-card:hover {
            transform: translateY(-4px);
        }
        
        .service-card:hover .card-icon {
            transform: scale(1.1);
        }
        
        .card-icon {
            transition: transform 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <!-- Alert messages -->
    <div th:if="${successMessage}" class="mb-4 p-4 bg-green-50 border-l-4 border-green-500 rounded-lg flex items-start">
        <i class="ri-checkbox-circle-fill text-green-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-green-800" th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start">
        <i class="ri-error-warning-fill text-red-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-red-800" th:text="${errorMessage}"></span>
    </div>

    <!-- Action Button -->
    <div class="mb-8 flex justify-end">
        <a href="/owner/services/create" 
           class="inline-flex items-center px-4 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:brightness-110 transition-all shadow-md hover:shadow-lg">
            <i class="ri-add-circle-line mr-2 text-base"></i>
            Thêm loại dịch vụ
        </a>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-2xl shadow-md hover:shadow-lg p-6 border border-gray-100 transition-all hover:scale-[1.01] group">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold tracking-wide text-gray-500 mb-1">Tổng loại dịch vụ</p>
                    <p class="text-3xl font-extrabold text-gray-900" th:text="${services.size()}">0</p>
                </div>
                <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center transition-colors group-hover:bg-blue-200">
                    <i class="ri-service-line text-xl text-blue-600 transition-colors group-hover:text-blue-700"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl shadow-md hover:shadow-lg p-6 border border-gray-100 transition-all hover:scale-[1.01] group">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold tracking-wide text-gray-500 mb-1">Tổng sản phẩm</p>
                    <p class="text-3xl font-extrabold text-gray-900" th:text="${totalItems}">0</p>
                </div>
                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center transition-colors group-hover:bg-green-200">
                    <i class="ri-stack-line text-xl text-green-600 transition-colors group-hover:text-green-700"></i>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl shadow-md hover:shadow-lg p-6 border border-gray-100 transition-all hover:scale-[1.01] group">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold tracking-wide text-gray-500 mb-1">Trung bình/loại</p>
                    <p class="text-3xl font-extrabold text-gray-900" th:text="${#numbers.formatDecimal(averageItems, 1, 1)}">0.0</p>
                    <p class="text-xs text-gray-500 mt-1">sản phẩm</p>
                </div>
                <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center transition-colors group-hover:bg-purple-200">
                    <i class="ri-pie-chart-line text-xl text-purple-600 transition-colors group-hover:text-purple-700"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 mb-8">
        <form th:action="@{/owner/services}" method="get" id="searchForm" class="relative">
            <input type="text" 
                   id="searchInput"
                   name="q"
                   th:value="${q}"
                   placeholder="Nhập tên dịch vụ để tìm kiếm..." 
                   class="w-full pl-11 pr-10 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-400 text-sm placeholder:text-gray-400">
            <i class="ri-search-line absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-lg"></i>
            <button type="submit" class="hidden">Search</button>
        </form>
    </div>

    <!-- Empty State -->
    <div th:if="${services.isEmpty()}" class="bg-white rounded-2xl shadow-md border border-gray-100 p-12 text-center">
        <div class="w-20 h-20 bg-gradient-to-br from-blue-100 to-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="ri-inbox-line text-4xl text-blue-500"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Chưa có loại dịch vụ nào</h3>
        <p class="text-gray-600 mb-6 max-w-md mx-auto">Hãy bắt đầu bằng cách thêm loại dịch vụ đầu tiên cho sân của bạn.</p>
        <a href="/owner/services/create" 
           class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold rounded-lg hover:from-blue-700 hover:to-blue-800 transition-all shadow-md hover:shadow-lg">
            <i class="ri-add-line mr-2 text-lg"></i>
            Thêm loại dịch vụ đầu tiên
        </a>
    </div>
    <!-- Services Grid -->
    <div th:if="${!services.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="servicesGrid">
        <a th:each="service : ${services}"
           th:href="@{/owner/services/{id}/items(id=${service.id})}"
           class="service-card bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl shadow-md border border-gray-100 hover:shadow-lg hover:scale-105 transition-all cursor-pointer block overflow-hidden group">
            <div class="p-6">
                <!-- Icon with gradient background -->
                <div class="card-icon relative mb-5">
                    <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto shadow-md">
                        <i class="ri-service-line text-3xl text-white"></i>
                    </div>
                </div>

                <!-- Service Name with small icon -->
                <div class="flex items-center justify-center gap-2 mb-2">
                    <i class="ri-tools-line text-blue-600/80"></i>
                    <h3 class="font-extrabold text-gray-900 text-center text-lg group-hover:text-blue-700 transition-colors"
                        th:text="${service.name}">Tên loại dịch vụ</h3>
                </div>

                <!-- Optional description line (placeholder if none) -->
                <p class="text-xs text-gray-600 text-center min-h-[1rem] mb-4"></p>

                <!-- Product Count Badge -->
                <div class="flex justify-center mb-4">
                    <span class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold bg-white/70 backdrop-blur border border-blue-200 text-blue-700">
                        <i class="ri-stack-line mr-1.5"></i>
                        <span th:text="${service.serviceItems != null ? service.serviceItems.size() : 0}">0</span>
                        <span class="ml-1">sản phẩm</span>
                    </span>
                </div>
                
                <!-- Actions -->
                <div class="flex items-center gap-2 pt-4 border-t border-gray-200">
                    <a th:href="@{/owner/services/edit/{id}(id=${service.id})}" 
                       class="flex-1 flex items-center justify-center gap-1.5 py-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors font-semibold text-sm"
                       onclick="event.stopPropagation()">
                        <i class="ri-edit-line"></i>
                        <span>Sửa</span>
                    </a>
                    <button th:onclick="|event.stopPropagation(); deleteService(${service.id})|" 
                            class="flex-1 flex items-center justify-center gap-1.5 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors font-semibold text-sm">
                        <i class="ri-delete-bin-line"></i>
                        <span>Xóa</span>
                    </button>
                </div>
            </div>
        </a>
    </div>
</div>

<script>
    // Backend search submit with debounce
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const searchForm = document.getElementById('searchForm');
        let debounceTimer;

        if (searchInput && searchForm) {
            const submitSearch = () => {
                searchForm.requestSubmit();
            };

            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(submitSearch, 400);
            });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitSearch();
                }
            });
        }
    });
    
    // Delete functionality
    function deleteService(serviceId) {
        const confirmed = confirm('⚠️ Bạn có chắc chắn muốn xóa loại dịch vụ này?\n\nTất cả sản phẩm thuộc loại này cũng sẽ bị xóa vĩnh viễn.');
        
        if (confirmed) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/owner/services/delete/' + serviceId;
            document.body.appendChild(form);
            form.submit();
        }
    }
</script>
</div>
</body>
</html>
