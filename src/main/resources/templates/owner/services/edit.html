<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="content">
<head>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <style>
        :where([class^="ri-"])::before {
            content: "\f3c2";
        }
    </style>
</head>
<div class="p-6">
    <div class="mb-8">
        <div class="flex items-center gap-4 mb-4">
            <a th:href="@{/owner/services}" class="flex items-center text-gray-600 hover:text-blue-600 transition-colors">
                <i class="ri-arrow-left-line text-lg mr-2"></i>
                <span class="text-sm font-medium">Quay lại</span>
            </a>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Chỉnh sửa loại dịch vụ</h1>
        <p class="text-gray-600">Cập nhật thông tin cho loại dịch vụ của bạn</p>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start">
        <i class="ri-error-warning-fill text-red-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-red-800" th:text="${errorMessage}"></span>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form th:action="@{/owner/services/edit/{id}(id=${serviceId})}" method="post" class="space-y-6">
                    <div>
                <label for="serviceName" class="block text-sm font-semibold text-gray-700 mb-2">
                    Tên loại dịch vụ <span class="text-red-500">*</span>
                        </label>
                        <input
                                type="text"
                                id="serviceName"
                                name="name"
                    required
                                th:value="${serviceRequest != null ? serviceRequest.name : ''}"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                    placeholder="Ví dụ: Đồ uống, Phụ kiện, Dịch vụ thuê..."
                >
                <p class="mt-2 text-xs text-gray-500">
                    <i class="ri-information-line mr-1"></i>
                    Tên loại dịch vụ sẽ được sử dụng để nhóm các sản phẩm/dịch vụ cụ thể
                </p>
            </div>

            <div class="flex items-center justify-end gap-4 pt-6 border-t border-gray-200">
                <a
                    th:href="@{/owner/services}"
                    class="px-6 py-3 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium">
                    Hủy
                </a>
                <button
                    type="submit"
                    class="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl hover:from-blue-700 hover:to-blue-800 transition-all shadow-lg hover:shadow-xl text-sm font-medium">
                    <i class="ri-save-line mr-2"></i>
                    Lưu thay đổi
                </button>
            </div>
        </form>
    </div>
</div>
</html>
