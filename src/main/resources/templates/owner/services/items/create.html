<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Service Item</title>
</head>
<body>
<div th:fragment="content" class="p-6">
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <style>
        :where([class^="ri-"])::before {
            content: "\f3c2";
        }
    </style>
    <!-- Breadcrumb -->
    <div class="mb-6">
        <div class="flex items-center gap-2 text-sm text-gray-600 mb-4">
            <a th:href="@{/owner/services}" class="hover:text-blue-600 transition-colors">Quản lý Dịch vụ</a>
            <i class="ri-arrow-right-s-line text-xs"></i>
            <a th:href="@{/owner/services/{id}/items(id=${service.id})}" 
               class="hover:text-blue-600 transition-colors" 
               th:text="${service.name}">Tên loại dịch vụ</a>
            <i class="ri-arrow-right-s-line text-xs"></i>
            <span class="text-gray-900 font-semibold">Thêm sản phẩm mới</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Thêm sản phẩm mới</h1>
        <p class="text-gray-600" th:text="'Thêm sản phẩm vào loại dịch vụ: ' + ${service.name}">Thêm sản phẩm vào loại dịch vụ</p>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start">
        <i class="ri-error-warning-fill text-red-500 text-xl mr-3 mt-0.5"></i>
        <span class="text-red-800" th:text="${errorMessage}"></span>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
        <form id="create-service-item-form" method="post" class="space-y-6">
            <div>
                <label for="serviceName" class="block text-sm font-semibold text-gray-700 mb-2">
                    Loại dịch vụ
                </label>
                <input
                    type="text"
                    id="serviceName"
                    th:value="${service.name}"
                    disabled
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-500 text-sm cursor-not-allowed"
                >
            </div>

            <div>
                <label for="productName" class="block text-sm font-semibold text-gray-700 mb-2">
                    Tên sản phẩm <span class="text-red-500">*</span>
                </label>
                <input
                    type="text"
                    id="productName"
                    name="name"
                    placeholder="Nhập tên sản phẩm..."
                    required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                >
                <p class="mt-2 text-xs text-gray-500">
                    <i class="ri-information-line mr-1"></i>
                    Ví dụ: Nước suối Aquafina, Bóng đá Size 5, Khăn lau mồ hôi, v.v.
                </p>
            </div>

            <div class="flex items-center justify-end gap-4 pt-6 border-t border-gray-200">
                <a th:href="@{/owner/services/{id}/items(id=${service.id})}" 
                   class="px-6 py-3 border border-gray-300 text-gray-700 rounded-xl hover:bg-gray-50 transition-colors text-sm font-medium">
                    Hủy
                </a>
                <button type="submit" 
                        class="px-6 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl hover:from-blue-700 hover:to-blue-800 transition-all shadow-lg hover:shadow-xl text-sm font-medium">
                    <i class="ri-save-line mr-2"></i>
                    Lưu sản phẩm
                </button>
            </div>
        </form>
    </div>

<section layout:fragment="scripts">
<script id="form-validation">
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('create-service-item-form');
        const productNameInput = document.getElementById('productName');

        productNameInput.focus();

        form.addEventListener('submit', function(e) {
            const productName = productNameInput.value.trim();
            
            if (!productName) {
                e.preventDefault();
                productNameInput.classList.add('border-red-300', 'focus:ring-red-500');
                alert('Vui lòng nhập tên sản phẩm');
                return false;
            }

            if (productName.length > 200) {
                e.preventDefault();
                alert('Tên sản phẩm không được vượt quá 200 ký tự');
                return false;
            }
        });

        productNameInput.addEventListener('input', function() {
            this.classList.remove('border-red-300', 'focus:ring-red-500');
        });
    });
</script>
</section>
</body>
</html>
