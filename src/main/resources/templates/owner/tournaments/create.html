<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="content">
<div class="create-section">
    <!-- Header -->
    <div class="section-header">
        <h2>Create New Tournament</h2>
    </div>

    <!-- Form -->
    <div class="form-container">
        <form th:action="@{/owner/tournaments/save}" method="post" enctype="multipart/form-data" class="form">
            <div class="form-grid">
                <!-- Basic Information -->
                <div class="form-group-section">
                    <h3>Tournament Information</h3>

                    <div class="form-group">
                        <label>Tournament Name *</label>
                        <input type="text" name="name" required placeholder="e.g., Spring Football Championship">
                    </div>

                    <div class="form-group">
                        <label>Description *</label>
                        <textarea name="description" rows="4" required placeholder="Tournament description"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Featured Image</label>
                        <div class="file-upload">
                            <input type="file" name="image" accept="image/*" id="imageInput">
                            <label for="imageInput" class="upload-label">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>Click to upload tournament image</span>
                            </label>
                            <div class="image-preview" id="imagePreview"></div>
                        </div>
                    </div>
                </div>

                <!-- Tournament Details -->
                <div class="form-group-section">
                    <h3>Tournament Details</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tournament Type *</label>
                            <select name="type" required>
                                <option value="">Select type</option>
                                <option value="league">League</option>
                                <option value="knockout">Knockout</option>
                                <option value="roundrobin">Round Robin</option>
                                <option value="mixed">Mixed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Sport Type *</label>
                            <select name="sportType" required>
                                <option value="">Select sport</option>
                                <option value="football">Football</option>
                                <option value="basketball">Basketball</option>
                                <option value="volleyball">Volleyball</option>
                                <option value="badminton">Badminton</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Date *</label>
                            <input type="date" name="startDate" required>
                        </div>
                        <div class="form-group">
                            <label>End Date *</label>
                            <input type="date" name="endDate" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Max Teams *</label>
                            <input type="number" name="maxTeams" required min="2" placeholder="16">
                        </div>
                        <div class="form-group">
                            <label>Players per Team *</label>
                            <input type="number" name="playersPerTeam" required min="1" placeholder="11">
                        </div>
                    </div>
                </div>

                <!-- Prize Information -->
                <div class="form-group-section">
                    <h3>Prize & Pricing</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Prize Pool ($)</label>
                            <input type="number" name="prizePool" min="0" step="0.01" placeholder="2000">
                        </div>
                        <div class="form-group">
                            <label>Registration Fee ($)</label>
                            <input type="number" name="registrationFee" min="0" step="0.01" placeholder="100">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Prize Distribution</label>
                        <div class="prize-distribution">
                            <div class="prize-item">
                                <label>1st Place (%)</label>
                                <input type="number" name="prize1st" min="0" max="100" placeholder="50">
                            </div>
                            <div class="prize-item">
                                <label>2nd Place (%)</label>
                                <input type="number" name="prize2nd" min="0" max="100" placeholder="30">
                            </div>
                            <div class="prize-item">
                                <label>3rd Place (%)</label>
                                <input type="number" name="prize3rd" min="0" max="100" placeholder="20">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Venue & Fields -->
                <div class="form-group-section">
                    <h3>Venue & Fields</h3>

                    <div class="form-group">
                        <label>Select Fields *</label>
                        <div class="checkbox-group">
                            <div class="checkbox">
                                <input type="checkbox" name="fields" value="1" required>
                                <label>Field 1 - Premium Court</label>
                            </div>
                            <div class="checkbox">
                                <input type="checkbox" name="fields" value="2">
                                <label>Field 2 - Standard Court</label>
                            </div>
                            <div class="checkbox">
                                <input type="checkbox" name="fields" value="3">
                                <label>Field 3 - VIP Court</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Settings -->
                <div class="form-group-section">
                    <h3>Settings</h3>

                    <div class="checkbox">
                        <input type="checkbox" name="published" id="published" checked>
                        <label for="published">Publish Tournament</label>
                    </div>

                    <div class="checkbox">
                        <input type="checkbox" name="registrationOpen" id="registrationOpen" checked>
                        <label for="registrationOpen">Allow Team Registration</label>
                    </div>

                    <div class="checkbox">
                        <input type="checkbox" name="featured" id="featured">
                        <label for="featured">Feature this tournament</label>
                    </div>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Create Tournament
                </button>
                <a href="/owner/tournaments" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        if (e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.createElement('img');
                img.src = event.target.result;
                preview.appendChild(img);
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });
</script>
