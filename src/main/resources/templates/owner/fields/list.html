<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/owner/owner}">
<div class="fields-section"  th:fragment="content">
    <!-- Header -->
    <div class="section-header">
        <h2>Manage Fields</h2>
        <a href="/owner/fields/create" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New Field
        </a>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
        <div class="filter-group">
            <input type="text" class="filter-input" placeholder="Search fields...">
        </div>
        <div class="filter-group">
            <select class="filter-select">
                <option>All Status</option>
                <option>Active</option>
                <option>Inactive</option>
                <option>Maintenance</option>
            </select>
        </div>
        <button class="btn btn-secondary">
            <i class="fas fa-filter"></i> More Filters
        </button>
    </div>

    <!-- Fields Grid -->
    <div class="fields-grid" th:if="${fields != null}">
        <div class="field-card" th:each="field : ${fields}">
            <div class="field-image">
                <img th:src="${field.banner}" th:alt="${field.name}">
                <span class="status-badge"
                      th:classappend="${field.status}"
                      th:text="${field.status}">Status</span>
            </div>

            <div class="field-details">
                <h3 th:text="${field.name + ' - ' + field.fieldTypeResponse.name}">Tên sân</h3>
                <p class="field-location">
                    <i class="fas fa-map-marker-alt"></i>
                    <span th:text="${field.address + ', ' + field.wardResponse.name}">Địa chỉ</span>
                </p>

                <div class="field-stats">
                    <div class="stat">
                        <span class="stat-label">Rating</span>
                        <span class="stat-value" th:text="${field.rating != null ? field.rating + '★' : 'N/A'}">4.8★</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Giờ mở cửa</span>
                        <span class="stat-value" th:text="${field.openTime}">08:00</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Giờ đóng cửa</span>
                        <span class="stat-value" th:text="${field.closeTime}">22:00</span>
                    </div>
                </div>

                <div class="field-actions">
                    <a th:href="@{'/owner/fields/' + ${field.id} + '/edit'}" class="action-link edit">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <a th:href="@{'/' + ${field.fieldTypeResponse.slug} + '/' + ${field.slug}}" class="action-link view">
                        <i class="fas fa-eye"></i> View
                    </a>
                    <button class="action-link delete"
                            th:attr="onclick='deleteField(' + ${field.id} + ')'">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

<section layout:fragment="scripts">
    <script th:inline="javascript">
        function deleteField(id) {
            Swal.fire({
                title: 'Xóa sân này?',
                text: "Hành động này không thể hoàn tác!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Xóa ngay',
                cancelButtonText: 'Hủy bỏ'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(`/owner/fields/${id}/delete`, {
                        method: 'DELETE'
                    })
                        .then(response => {
                            if (response.ok) {
                                Swal.fire({
                                    title: 'Đã xóa!',
                                    text: 'Sân đã được xóa thành công.',
                                    icon: 'success',
                                    timer: 2000,
                                    showConfirmButton: false
                                }).then(() => {
                                    window.location.reload();
                                });
                            } else {
                                Swal.fire('Lỗi', 'Không thể xóa sân này.', 'error');
                            }
                        })
                        .catch(() => Swal.fire('Lỗi', 'Có lỗi xảy ra khi gửi yêu cầu.', 'error'));
                }
            });
        }

</script>
</section>
