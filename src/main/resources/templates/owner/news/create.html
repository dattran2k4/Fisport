<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="content">
<div class="create-section">
    <!-- Header -->
    <div class="section-header">
        <h2>Post News</h2>
    </div>

    <!-- Form -->
    <div class="form-container">
        <form th:action="@{/owner/news/save}" method="post" enctype="multipart/form-data" class="form">
            <div class="form-grid">
                <!-- Basic Information -->
                <div class="form-group-section">
                    <h3>News Information</h3>

                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" name="title" required placeholder="Enter news title">
                    </div>

                    <div class="form-group">
                        <label>Slug</label>
                        <input type="text" name="slug" placeholder="auto-generated from title">
                    </div>

                    <div class="form-group">
                        <label>Excerpt *</label>
                        <textarea name="excerpt" rows="3" required placeholder="Brief summary of the news"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Content *</label>
                        <textarea name="content" rows="8" required placeholder="Full news content" id="contentEditor"></textarea>
                    </div>
                </div>

                <!-- Featured Image -->
                <div class="form-group-section">
                    <h3>Featured Image</h3>

                    <div class="file-upload">
                        <input type="file" name="image" accept="image/*" id="imageInput">
                        <label for="imageInput" class="upload-label">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Click to upload featured image</span>
                        </label>
                        <div class="image-preview" id="imagePreview"></div>
                    </div>
                </div>

                <!-- Categories & Tags -->
                <div class="form-group-section">
                    <h3>Categories & Tags</h3>

                    <div class="form-group">
                        <label>Category *</label>
                        <select name="category" required>
                            <option value="">Select category</option>
                            <option value="announcement">Announcement</option>
                            <option value="event">Event</option>
                            <option value="maintenance">Maintenance</option>
                            <option value="promotion">Promotion</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tags</label>
                        <input type="text" name="tags" placeholder="Enter tags separated by comma">
                    </div>
                </div>

                <!-- Settings -->
                <div class="form-group-section">
                    <h3>Settings</h3>

                    <div class="radio-group">
                        <p style="margin-bottom: 15px; font-weight: 600;">Status</p>
                        <div class="radio">
                            <input type="radio" name="status" value="draft" id="draft" checked>
                            <label for="draft">Draft</label>
                        </div>
                        <div class="radio">
                            <input type="radio" name="status" value="published" id="published">
                            <label for="published">Published</label>
                        </div>
                    </div>

                    <div class="checkbox" style="margin-top: 15px;">
                        <input type="checkbox" name="featured" id="featured">
                        <label for="featured">Feature this news</label>
                    </div>
                </div>
            </div>

            <!-- Form Actions -->
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Post News
                </button>
                <a href="/owner/news" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = '';
        if (e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.createElement('img');
                img.src = event.target.result;
                preview.appendChild(img);
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });
</script>
