<header th:fragment="header" xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top py-3">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" th:href="@{/}">
                <img alt="Fisport" class="me-2" th:src="@{/web/img/logo.png}" width="35">
                <span style="font-size: 1.4rem;">Fisport</span>
            </a>

            <!-- Toggle button (mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto" id="mainNav">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">Trang chủ</a>
                    </li>
                    <li class="nav-item" th:each="t : ${fieldTypes}">
                        <a class="nav-link d-flex align-items-center" th:href="@{'/' + ${t.slug}}">
                            <i th:class="'me-1 bi ' + (
                                    ${t.slug} == 'bong-da'     ? 'bi-balloon' : (
                                    ${t.slug} == 'cau-long'    ? 'bi-feather' : (
                                    ${t.slug} == 'tennis'      ? 'bi-joystick' : (
                                    ${t.slug} == 'bong-ro'     ? 'bi-basket2' : (
                                    ${t.slug} == 'boi-loi'     ? 'bi-droplet' : (
                                    ${t.slug} == 'pickleball'  ? 'bi-disc' : 'bi-star'))))))"></i>
                            <span th:text="${t.name}">Loại sân</span>
                        </a>
                    </li>
                </ul>

                <!-- User Section -->
                <div class="d-flex align-items-center">
                    <!-- Nếu chưa đăng nhập -->
                    <div sec:authorize="isAnonymous()">
                        <a class="btn btn-outline-primary me-2 px-3" th:href="@{/login}">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
                        </a>
                        <a class="btn btn-primary px-3" th:href="@{/register}">
                            <i class="bi bi-person-plus me-1"></i> Đăng ký
                        </a>
                    </div>

                    <!-- Nếu đã đăng nhập -->
                    <div class="dropdown" sec:authorize="isAuthenticated()">
                        <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
                           href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-person-circle fs-4 text-primary me-2"></i>
                            <span sec:authentication="name">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm mt-2" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person me-2"></i> Hồ
                                sơ</a></li>
                            <li><a class="dropdown-item" th:href="@{/booking/history}"><i
                                    class="bi bi-clock-history me-2"></i> Lịch sử đặt sân</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" th:href="@{/logout}"><i
                                    class="bi bi-box-arrow-right me-2"></i> Đăng xuất</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
