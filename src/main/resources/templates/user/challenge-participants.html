<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trận đấu của tôi</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons (Bootstrap icons) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .match-card {
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .status-badge {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.35em 0.75em;
            border-radius: 1rem;
        }

        .match-fee {
            font-weight: 600;
            color: #0d6efd;
        }

        @media (max-width: 768px) {
            .match-card .d-flex {
                flex-direction: column;
            }

            .match-card .text-end {
                text-align: start !important;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>
<div class="container py-4">
    <h3 class="mb-4 fw-bold"><i class="bi bi-trophy text-warning me-2"></i>Trận đấu của tôi</h3>

    <div class="row g-3">
        <!-- Demo card 1 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card match-card border-0 shadow-sm p-3 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-semibold mb-0 text-truncate">
                        <i class="bi bi-dribbble text-danger me-2"></i>Sunday Challenge
                    </h5>
                    <span class="status-badge bg-warning text-dark">Pending</span>
                </div>
                <p class="text-muted mb-1"><i class="bi bi-geo-alt-fill me-1 text-secondary"></i>Stadium A, District 1
                </p>
                <p class="text-muted mb-1"><i class="bi bi-calendar-event me-1 text-secondary"></i>02/11/2025</p>
                <p class="text-muted mb-1"><i class="bi bi-person-lines-fill me-1 text-secondary"></i>Bóng đá · 5v5</p>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="match-fee"><i class="bi bi-cash-coin me-1"></i>50,000₫</span>
                    <button class="btn btn-sm btn-outline-primary"><i class="bi bi-credit-card me-1"></i>Thanh toán
                    </button>
                </div>
            </div>
        </div>

        <!-- Demo card 2 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card match-card border-0 shadow-sm p-3 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-semibold mb-0 text-truncate">
                        <i class="bi bi-basket2-fill text-success me-2"></i>Weekend Basketball
                    </h5>
                    <span class="status-badge bg-success text-white">Accepted</span>
                </div>
                <p class="text-muted mb-1"><i class="bi bi-geo-alt-fill me-1 text-secondary"></i>Gym Zone 2</p>
                <p class="text-muted mb-1"><i class="bi bi-calendar-event me-1 text-secondary"></i>03/11/2025</p>
                <p class="text-muted mb-1"><i class="bi bi-person-lines-fill me-1 text-secondary"></i>Bóng rổ · Friendly
                </p>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="match-fee text-muted"><i class="bi bi-cash me-1"></i>Đã thanh toán</span>
                    <button class="btn btn-sm btn-outline-secondary" disabled><i class="bi bi-check-circle me-1"></i>Đã
                        tham gia
                    </button>
                </div>
            </div>
        </div>

        <!-- Demo card 3 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card match-card border-0 shadow-sm p-3 bg-white">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-semibold mb-0 text-truncate">
                        <i class="bi bi-lightning-charge-fill text-warning me-2"></i>Evening Badminton
                    </h5>
                    <span class="status-badge bg-secondary text-white">Rejected</span>
                </div>
                <p class="text-muted mb-1"><i class="bi bi-geo-alt-fill me-1 text-secondary"></i>Sport Club C</p>
                <p class="text-muted mb-1"><i class="bi bi-calendar-event me-1 text-secondary"></i>04/11/2025</p>
                <p class="text-muted mb-1"><i class="bi bi-person-lines-fill me-1 text-secondary"></i>Cầu lông · 1v1</p>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="match-fee text-muted"><i class="bi bi-cash me-1"></i>Miễn phí</span>
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3 me-1"></i>Xóa</button>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
