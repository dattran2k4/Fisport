<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/user/user}">

<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <style>
        /* card */
        .card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        /* heading */
        .card h3 {
            font-weight: 600;
            color: #333;
        }

        /* input focus */
        .form-control:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25);
        }

        /* button hover */
        .btn-primary {
            background-color: #4a90e2;
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #357ABD;
        }

        /* alerts */
        .alert {
            border-radius: 8px;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card shadow-sm p-4">
                        <h3 class="mb-4 text-center">Đổi Mật Khẩu</h3>

                        <!-- Hiển thị lỗi nếu có -->
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                        <form th:action="@{/user/change-password}" th:object="${pass}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu hiện tại</label>
                                <input type="password" th:field="*{oldPassword}" class="form-control"
                                    placeholder="Nhập mật khẩu hiện tại" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mật khẩu mới</label>
                                <input type="password" th:field="*{newPassword}" class="form-control"
                                    placeholder="Nhập mật khẩu mới" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Xác nhận mật khẩu mới</label>
                                <input type="password" th:field="*{confirmNewPassword}" class="form-control"
                                    placeholder="Xác nhận mật khẩu mới" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Cập nhật mật khẩu</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
