<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/user/user}">

<head>
  <meta charset="UTF-8" />
  <title>User Booking</title>
</head>

<body>
  <div class="content" layout:fragment="content">
    <h3 class="mb-4">My Bookings</h3>

    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Field</th>
              <th>Date</th>
              <th>Time</th>
              <th>Total Price</th>
              <th>Payment Method</th>
              <th>Status</th>
              <th>Day Status</th>
              <th>Actions</th>
              <th>Rating</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="booking, iterStat : ${bookings}">
              <td th:text="${iterStat.count}">1</td>
              <td th:text="${booking.fieldName}">Field A</td>
              <td th:text="${#temporals.format(booking.date, 'dd/MM/yyyy')}">
                01/10/2025
              </td>
              <td th:text="${booking.startTime + ' - ' + booking.endTime}">
                08:00 - 10:00
              </td>
              <td th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT')}">
                $0.00
              </td>
              <td th:text="${booking.paymentMethod}">Credit Card</td>

              <!-- Booking status badge -->
              <td>
                <span th:class="${booking.status == 'FAILED' ? 'badge bg-danger' :
                                                 booking.status == 'PENDING' ? 'badge bg-warning text-dark' :
                                                 booking.status == 'PAID' ? 'badge bg-info text-dark' :
                                                 booking.status == 'COMPLETED' ? 'badge bg-success' :
                                                 'badge bg-secondary'}" th:text="${booking.status}">Status
                </span>
              </td>

              <!-- Day Status badge -->
              <td>
                <span th:class="${booking.status == 'FAILED' ? 'badge bg-danger' : booking.date.isAfter(T(java.time.LocalDate).now()) ? 'badge bg-info' : booking.date.isEqual(T(java.time.LocalDate).now()) ? 'badge bg-warning text-dark' :
                                                 'badge bg-secondary'}" th:text="${booking.status == 'FAILED' ? 'Failed' :
                                    booking.date.isAfter(T(java.time.LocalDate).now()) ? 'Upcoming' :
                                    booking.date.isEqual(T(java.time.LocalDate).now()) ? 'Today' :
                                    'Past'}">Upcoming
                </span>
              </td>

              <!-- Actions -->
              <td>
                <!-- Cancel button -->
                <button th:if="${booking.cancel}" class="btn btn-sm btn-danger btn-cancel-booking" type="button"
                  th:data-booking-id="${booking.id}">
                  <i class="bi bi-x-circle"></i>
                </button>
                <a th:if="${booking.canReview}" th:href="@{/user/bookings/review/{id}(id=${booking.id})}"
                  class="btn btn-sm btn-success" title="Review">
                  <i class="bi bi-star-fill"></i>
                </a>
                <button th:if="${booking.status == 'PAID'}" class="btn btn-sm btn-primary btn-create-challenge"
                  type="button" data-bs-toggle="modal" data-bs-target="#createChallengeModal"
                  th:data-booking-id="${booking.id}">
                  <i class="bi bi-lightning-fill"></i> Tạo thách đấu ⚔️
                </button>
              </td>

              <!-- Inline Rating -->
              <td>
                <span th:if="${booking.rating != null}">
                  <i class="bi bi-star-fill text-warning" th:each="i : ${#numbers.sequence(1, booking.rating)}"></i>
                  <i class="bi bi-star text-muted" th:each="i : ${#numbers.sequence(booking.rating + 1 ,5)}"></i>
                </span>
                <span th:if="${booking.rating == null}"> Not yet </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <!-- Modal tạo thách đấu -->
    <div class="modal fade" id="createChallengeModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content rounded-4 shadow">

          <!-- Header -->
          <div class="modal-header">
            <h5 class="modal-title">⚔️ Tạo trận thách đấu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>

          <!-- Body Form -->
          <div class="modal-body">
            <form id="challengeForm">
              <div class="row g-3">

                <div class="col-md-6">
                  <label class="form-label">Loại hình 🏅</label>
                  <select class="form-select" name="matchType" required>
                    <option value="" disabled selected>Chọn loại hình</option>
                    <option value="SINGLE">Đơn 🧑 vs 🧑</option>
                    <option value="DOUBLE">Đôi 🧑👤 vs 🧑👤</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Phí tham gia 💰</label>
                  <input type="number" name="fee" class="form-control" placeholder="Nhập phí (VND)" min="0" required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Tiêu đề trận đấu 🏆</label>
                  <input type="text" name="title" class="form-control" placeholder="Nhập tiêu đề" maxlength="50"
                    required>
                </div>

                <div class="col-md-6">
                  <label class="form-label">Level Suggest 🎯</label>
                  <select class="form-select" name="levelSuggest" required>
                    <option value="" disabled selected>Chọn level</option>
                    <option value="BEGINNER">Beginner 🟢</option>
                    <option value="INTERMEDIATE">Intermediate 🟡</option>
                    <option value="ADVANCED">Advanced 🔴</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label">Ghi chú 📝</label>
                  <textarea name="note" class="form-control" placeholder="Ghi chú thêm" maxlength="200"
                    rows="3"></textarea>
                </div>

              </div>
            </form>
          </div>

          <!-- Footer -->
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy ❌</button>
            <button type="submit" form="challengeForm" class="btn btn-primary">Tạo trận đấu ✅</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section layout:fragment="scripts">
    <script th:inline="javascript">
      /*[# th:if="${review}"]*/
      Swal.fire({
        icon: 'success',
        title: 'Success',
        text: /*[[${review}]]*/,
        timer: 2500,
        showConfirmButton: false
      });
      /*[/]*/
      $(document).ready(function () {
        $(document).on("click", ".btn-cancel-booking", function () {
          const bookingId = $(this).data("booking-id");
          const $button = $(this);

          if (!bookingId) return;

          if (!confirm(`Bạn có chắc chắn muốn hủy booking #${bookingId}?`)) return;

          $.ajax({
            url: `/api/v1/bookings/${bookingId}/cancel`,
            type: "POST",
            beforeSend: function () {
              $button
                .prop("disabled", true)
                .html('<i class="bi bi-hourglass-split"></i> Đang hủy...');
            },
            success: function (response) {
              // ✅ Kiểm tra field "status" trong JSON
              if (response.status == 202) {
                Swal.fire({
                  icon: "success",
                  title: "Thành công",
                  text: response.message || "Hủy booking thành công!",
                  timer: 2000,
                  showConfirmButton: false,
                });

                $button
                  .prop("disabled", true)
                  .removeClass("btn-danger")
                  .addClass("btn-secondary")
                  .html('<i class="bi bi-check-circle"></i> Đã hủy');
              } else {
                // Nếu có status nhưng không nằm trong khoảng 2xx
                Swal.fire({
                  icon: "error",
                  title: "Lỗi",
                  text: response.message || "Không thể hủy booking.",
                });

                $button
                  .prop("disabled", false)
                  .html('<i class="bi bi-x-circle"></i> Hủy');
              }
            },
            error: function (xhr) {
              const msg =
                xhr.responseJSON?.message ||
                "Có lỗi xảy ra khi hủy booking, vui lòng thử lại.";

              Swal.fire({
                icon: "error",
                title: "Thất bại",
                text: msg,
              });

              $button
                .prop("disabled", false)
                .html('<i class="bi bi-x-circle"></i> Hủy');
            },
          });
        });
      });
    </script>
  </section>
</body>

</html>
