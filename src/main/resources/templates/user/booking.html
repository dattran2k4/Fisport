<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/user/user}">

<head>
    <meta charset="UTF-8">
    <title>User Booking</title>
</head>

<body>
    <div class="content" layout:fragment="content">
        <h3 class="mb-4">My Bookings</h3>

        <div class="card p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Field</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Total Price</th>
                            <th>Payment Method</th>
                            <th>Status</th>
                            <th>Day Status</th>
                            <th>Actions</th>
                            <th>Rating</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking, iterStat : ${bookings}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${booking.fieldName}">Field A</td>
                            <td th:text="${#temporals.format(booking.date, 'dd/MM/yyyy')}">01/10/2025</td>
                            <td th:text="${booking.startTime + ' - ' + booking.endTime}">08:00 - 10:00</td>
                            <td th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT')}">$0.00
                            </td>
                            <td th:text="${booking.paymentMethod}">Credit Card</td>

                            <!-- Booking status badge -->
                            <td>
                                <span th:class="${booking.status == 'FAILED' ? 'badge bg-danger' :
                                                 booking.status == 'PENDING' ? 'badge bg-warning text-dark' :
                                                 booking.status == 'PAID' ? 'badge bg-info text-dark' :
                                                 booking.status == 'COMPLETED' ? 'badge bg-success' :
                                                 'badge bg-secondary'}" th:text="${booking.status}">Status
                                </span>
                            </td>

                            <!-- Day Status badge -->
                            <td>
                                <span th:class="${booking.status == 'FAILED' ? 'badge bg-danger' : booking.date.isAfter(T(java.time.LocalDate).now()) ? 'badge bg-info' : booking.date.isEqual(T(java.time.LocalDate).now()) ? 'badge bg-warning text-dark' :
                                                 'badge bg-secondary'}" th:text="${booking.status == 'FAILED' ? 'Failed' :
                                    booking.date.isAfter(T(java.time.LocalDate).now()) ? 'Upcoming' :
                                    booking.date.isEqual(T(java.time.LocalDate).now()) ? 'Today' :
                                    'Past'}">Upcoming
                                </span>
                            </td>

                            <!-- Actions -->
                            <td>
                                <button th:if="${booking.cancel}" class="btn btn-sm btn-danger" data-bs-toggle="modal"
                                    th:data-bs-target="'#cancelModal' + ${iterStat.count}" title="Cancel Booking">
                                    <i class="bi bi-x-circle"></i>
                                </button>

                                <a th:if="${booking.canReview}"
                                    th:href="@{/user/bookings/review/{id}(id=${booking.id})}"
                                    class="btn btn-sm btn-success" title="Review">
                                    <i class="bi bi-star-fill"></i>
                                </a>
                            </td>

                            <!-- Inline Rating -->
                            <td>
                                <span th:if="${booking.rating != null}">
                                    <i class="bi bi-star-fill text-warning"
                                        th:each="i : ${#numbers.sequence(1, booking.rating)}"></i>
                                    <i class="bi bi-star text-muted"
                                        th:each="i : ${#numbers.sequence(booking.rating +1,5)}"></i>
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <section layout:fragment="scripts">
        <script th:inline="javascript" th:if="${review}">
            Swal.fire({
                icon: 'success',
                title: 'Success',
                text: /*[[${review}]]*/,
                timer: 2500,
                showConfirmButton: false
            });
        </script>
    </section>
</body>

</html>
