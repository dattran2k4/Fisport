<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/user/user}">

<head>
    <meta charset="UTF-8">
    <title>Xác thực 2FA</title>
    <style>
        .twofa-card {
            max-width: 600px;
            margin: 40px auto;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }

        .status-badge {
            font-size: 0.9rem;
            padding: 0.5em 1em;
            border-radius: 20px;
        }

        .btn-toggle-2fa {
            font-weight: 600;
            padding: 10px 25px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn-toggle-2fa:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="container py-5">
            <div class="card shadow-lg twofa-card p-4 mx-auto" style="max-width: 480px;">
                <h3 class="mb-3 text-center text-primary">
                    <i class="bi bi-shield-lock-fill me-2"></i> Xác thực hai yếu tố (2FA)
                </h3>
                <p class="text-muted text-center mb-4">
                    Bảo vệ tài khoản của bạn bằng cách bật xác thực hai yếu tố (2FA).
                </p>

                <!-- Trạng thái -->
                <div class="text-center mb-4">
                    <span th:if="${#authentication.principal.user.isTwoFAEnable}"
                        class="badge bg-success px-3 py-2 fs-6">
                        <i class="bi bi-check-circle me-1"></i> 2FA đang bật
                    </span>
                    <span th:if="${!#authentication.principal.user.isTwoFAEnable}"
                        class="badge bg-danger px-3 py-2 fs-6">
                        <i class="bi bi-x-circle me-1"></i> 2FA đang tắt
                    </span>
                </div>

                <!-- Nếu 2FA đang bật -->
                <div th:if="${#authentication.principal.user.isTwoFAEnable}" class="text-center">
                    <form id="disable-2fa-form">
                        <div class="mb-3">
                            <input type="text" id="disableCode" class="form-control text-center" maxlength="6"
                                placeholder="Nhập mã 6 chữ số để tắt 2FA" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">
                            <i class="bi bi-shield-x me-2"></i> Tắt 2FA
                        </button>
                    </form>
                </div>

                <!-- Nếu 2FA đang tắt -->
                <div th:if="${!#authentication.principal.user.isTwoFAEnable}" class="text-center">
                    <button id="enable-2fa-btn" class="btn btn-success w-100 mb-3">
                        <i class="bi bi-shield-check me-2"></i> Bật 2FA
                    </button>

                    <!-- Khu vực hiển thị sau khi nhấn bật -->
                    <div id="qr-section" class="mt-4 d-none">
                        <img id="qrImage" alt="QR Code" class="mx-auto d-block mb-3" style="width: 200px;">
                        <p class="text-muted small">
                            Quét mã QR bằng ứng dụng <b>Google Authenticator</b> hoặc nhập thủ công bằng đường dẫn:
                            <br>
                            <a id="otpLink" href="#" target="_blank" class="text-decoration-none text-primary"></a>
                        </p>
                        <input type="text" id="enableCode" maxlength="6" class="form-control text-center mb-3"
                            placeholder="Nhập mã 6 chữ số từ ứng dụng" required>
                        <button id="confirmEnable" class="btn btn-primary w-100">
                            <i class="bi bi-check-circle me-2"></i> Xác nhận bật 2FA
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <section layout:fragment="scripts">
        <script>
            $(document).ready(function () {


                $('#enable-2fa-btn').click(function () {
                    $.ajax({
                        url: '/api/auth/2fa/generate-qr',
                        type: 'GET',
                        success: function (response) {
                            $('#qrImage').attr('src', response.data.qrCode);
                            $('#otpLink').text(response.data.url).attr('href', response.data.url);
                            $('#qr-section').removeClass('d-none');
                            $('#enable-2fa-btn').prop('disabled', true).text('Đang bật 2FA...');
                        },
                        error: function (xhr) {
                            showToast('error', response.message || 'Không thể bật 2FA');
                        }
                    });
                });

                $('#confirmEnable').click(function () {
                    const code = $('#enableCode').val().trim();
                    if (code.length !== 6) {
                        showToast('warning', 'Vui lòng nhập mã 6 chữ số!');
                        return;
                    }
                    $.ajax({
                        url: '/api/auth/2fa/enable',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ code: code }),
                        success: function (response) {
                            showToast('success', response.message || 'Bật 2FA thành công!');
                            setTimeout(() => location.reload(), 1500);
                            $('#qrSection').hide();
                            $('#generateQR').hide();
                        },
                        error: function (xhr) {
                            showToast('error', response.message || 'Lỗi server khi xác nhận bật 2FA');
                        }
                    })
                });

                $('#disable-2fa-form').submit(function (e) {
                    e.preventDefault();
                    const code = $('#disableCode').val().trim();
                    if (code.length !== 6) {
                        showToast('warning', 'Vui lòng nhập mã 6 chữ số!');
                        return;
                    }

                    $.ajax({
                        url: '/api/auth/2fa/disable',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ code: code }),
                        success: function (res) {
                            showToast('success', res.message || 'Đã tắt 2FA thành công!');
                            setTimeout(() => location.reload(), 1500);
                        },
                        error: function () {
                            showToast('error', res.message || 'Mã xác minh không hợp lệ!');

                        }
                    });
                });



                function showToast(type, message) {
                    let bg = 'bg-success';
                    if (type === 'error') bg = 'bg-danger';
                    if (type === 'warning') bg = 'bg-warning text-dark';

                    const toast = $(`
            <div class="toast align-items-center text-white ${bg} border-0" role="alert" style="position: fixed; top: 1rem; right: 1rem; z-index: 1055;">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `);
                    $('body').append(toast);
                    const bsToast = new bootstrap.Toast(toast[0]);
                    bsToast.show();
                    setTimeout(() => toast.remove(), 3000);
                }
            });
        </script>
    </section>
</body>

</html>
