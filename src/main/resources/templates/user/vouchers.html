<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{/layout/user/user}">

<head>
    <meta charset="UTF-8">
    <title>Vouchers</title>
    <style>
        /* Container padding */
        .container {
            padding: 2rem 1rem;
        }

        /* Card cơ bản */
        .card {
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        /* Hover effect */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Badge trạng thái */
        .badge {
            font-size: 0.8rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
        }

        /* Expired badge màu xám */
        .badge.bg-secondary {
            background-color: #adb5bd !important;
            color: #fff;
        }

        /* Active badge màu xanh */
        .badge.bg-success {
            background-color: #28a745 !important;
            color: #fff;
        }

        /* Tiêu đề card */
        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Mô tả voucher */
        .card-text {
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: #495057;
        }

        /* Discount & Limit */
        .card p strong {
            color: #212529;
        }

        /* Ngày bắt đầu / kết thúc */
        .card p.text-muted {
            font-size: 0.85rem;
        }

        /* Responsive grid spacing */
        .row.g-3 {
            gap: 1rem;
        }

        /* Mobile nhỏ hơn 576px: mỗi card full width */
        @media (max-width: 575.98px) {
            .col-md-4 {
                flex: 0 0 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="container py-4">
            <h2 class="mb-4">Your Vouchers</h2>
            <div class="row g-3">
                <div class="col-md-4" th:each="voucher : ${vouchers}">
                    <div class="card shadow-sm h-100">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title" th:text="${voucher.code}">VOUCHER123</h5>
                                <span class="badge"
                                    th:classappend="${voucher.endDate.isBefore(T(java.time.LocalDate).now())} ? 'bg-secondary' : 'bg-success'"
                                    th:text="${voucher.endDate.isBefore(T(java.time.LocalDate).now())} ? 'Expired' : 'Active'">
                                    Active
                                </span>
                            </div>
                            <p class="card-text text-muted" th:text="${voucher.description}">Mô tả voucher</p>
                            <p class="mb-1"><strong>Discount:</strong> <span
                                    th:text="${voucher.discount} + '%'">10%</span></p>
                            <p class="mb-1"><strong>Limit:</strong> <span th:text="${voucher.limit}">100</span></p>
                            <p class="mb-0 text-muted">
                                <i class="bi bi-calendar2-event"></i>
                                <span th:text="${#temporals.format(voucher.startDate, 'dd/MM/yyyy')}"></span> -
                                <span th:text="${#temporals.format(voucher.endDate, 'dd/MM/yyyy')}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
