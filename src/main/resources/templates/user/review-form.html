<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/layout/user/user}" >
<head>
    <meta charset="UTF-8">
    <title>Đánh giá sân</title>
</head>
<body>
    <div layout:fragment="content">
        <!--    Booking Info    -->
        <div class="card shadow-sm mb-4">
            <div class="card-body d-flex align-items-center">
                <img th:src="${booking.fieldBanner != null} ? ${booking.fieldBanner} : @{/web/img/field/default-field.jpg}" alt="Field image"
                     class="rounded me-3" style="width:100px; height:100px; object-fit:cover;">
                <div>
                    <h5 th:text="${booking.fieldName}">Sân Bóng Mini Quận 7</h5>
                    <p class="text-muted mb-1">
                        <i class="bi bi-calendar-event"></i>
                        <span th:text="${#temporals.format(booking.date, 'dd/MM/yyyy')}"></span> |
                        <i class="bi bi-clock"></i>
                        <span th:text="${booking.startTime}"></span> - <span th:text="${booking.endTime}"></span>
                    </p>
                    <span class="badge bg-success" th:text="${booking.status}">COMPLETED</span>
                </div>
            </div>
        </div>

        <!-- Hiển thị lỗi -->
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <!--    Form Review    -->
        <form th:action="@{/user/bookings/review/{id}(id=${booking.id})}"
              th:object="${review}" method="POST">
            <div class="mb-3">
                <label class="form-label">Rating</label>
                <select th:field="*{rating}" class="form-select" required>
                    <option value="" disabled selected>Choose rating</option>
                    <option th:value="1">1</option>
                    <option th:value="2">2</option>
                    <option th:value="3">3</option>
                    <option th:value="4">4</option>
                    <option th:value="5">5</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Comment</label>
                <textarea th:field="*{comment}" class="form-control" rows="3" required></textarea>
            </div>

            <button type="submit" class="btn btn-success">Submit Review</button>
        </form>
    </div>
</body>
</html>
