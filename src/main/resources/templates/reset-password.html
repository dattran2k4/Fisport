<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/common}">
<head>
    <title>Tạo lại mật khẩu</title>
    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        .reset-card {
            background: #fff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }

        .reset-card .form-control:focus {
            box-shadow: none;
            border-color: #764ba2;
        }

        .btn-reset {
            background-color: #764ba2;
            border-color: #764ba2;
        }

        .btn-reset:hover {
            background-color: #5a3591;
            border-color: #5a3591;
        }

        .message {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="reset-card">
        <h3 class="text-center mb-4"><i class="bi bi-shield-lock-fill"></i> Đặt lại mật khẩu</h3>
        <p class="text-center text-muted mb-4">Nhập mật khẩu mới và mã xác thực từ email của bạn</p>

        <form id="resetPasswordForm">
            <!-- New Password -->
            <div class="mb-3">
                <label for="newPassword" class="form-label">Mật khẩu mới</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                           placeholder="Mật khẩu mới" required>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           placeholder="Xác nhận mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-reset w-100">Đặt lại mật khẩu</button>
            <div id="responseMessage" class="message text-center"></div>
            <input type="hidden" id="verifyCode" value="${verifyCode}"/>
        </form>
    </div>
</div>
<section layout:fragment="scripts">
    <script th:inline="javascript">

        $(document).ready(function () {
            $('#resetPasswordForm').submit(function (e) {
                e.preventDefault();
                $('#responseMessage').removeClass('text-success text-danger').text('');

                const verifyCode = $('#verifyCode').val();
                const newPassword = $('#newPassword').val();
                const confirmPassword = $('#confirmPassword').val();

                if (newPassword !== confirmPassword) {
                    $('#responseMessage')
                        .addClass('text-danger')
                        .text('Mật khẩu xác nhận không khớp.');
                    return;
                }

                $.ajax({
                    url: '/api/auth/reset-password?verifyCode=' + verifyCode,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        newPassword: newPassword,
                        confirmPassword: confirmPassword
                    }),
                    dataType: 'json',
                    // Truyền verifyCode dưới dạng query param
                    beforeSend: function (xhr, settings) {
                        this.url += '?verifyCode=' + verifyCode;
                    },
                    success: function (response) {
                        $('#responseMessage')
                            .removeClass('text-danger')
                            .addClass('text-success')
                            .text(response.message || 'Mật khẩu đã được đặt lại.');
                        // Redirect đến login sau 2s
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    },
                    error: function (xhr) {
                        let msg = 'Đã xảy ra lỗi.';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            msg = xhr.responseJSON.message;
                        }
                        $('#responseMessage')
                            .removeClass('text-success')
                            .addClass('text-danger')
                            .text(msg);
                    }
                });
            });
        });
    </script>
</section>
</body>
</html>
