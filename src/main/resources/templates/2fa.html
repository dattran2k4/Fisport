<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2FA Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
          background-color: #f8f9fa;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }
        .twofa-card {
          width: 100%;
          max-width: 400px;
          border-radius: 0.75rem;
          padding: 2rem;
        }
    </style>
</head>
<body>
<div class="card shadow-sm twofa-card">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill text-primary" style="font-size:2rem;"></i>
        <h4 class="mt-2">Xác thực 2 bước</h4>
        <p class="text-muted mb-0">
            Xin chào <strong th:text="${username}"></strong>, vui lòng mở ứng dụng Google Authenticator và nhập mã 6 chữ số.
        </p>
    </div>

    <form th:action="@{/2fa/verify}" th:object="${request}" method="POST">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${errorCode}" class="alert alert-danger" th:text="${errorCode}"></div>
        <div class="mb-3">
            <label for="code" class="form-label">Mã xác thực</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                <input type="number" th:field="*{code}" class="form-control" id="code" placeholder="Nhập mã" maxlength="6" pattern="\\d{6}" required>
                <input type="hidden" th:field="*{username}" />
            </div>
        </div>

        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check2-circle me-2"></i> Xác nhận
            </button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function(){
    const inputs = Array.from(document.querySelectorAll('.code-input'));


    inputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    if(e.target.value && idx < inputs.length - 1) inputs[idx + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
    if(e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus();
    });
    input.addEventListener('paste', (e) => {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').trim();
    const digits = paste.replace(/\D/g, '').slice(0, inputs.length).split('');
    digits.forEach((ch, i) => inputs[i].value = ch);
    });
    });
    })();
</script>
</body>
</html>
