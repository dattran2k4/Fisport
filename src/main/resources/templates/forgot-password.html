<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/common}" lang="vn">
<head>
    <meta charset="UTF-8">
    <title>Quên tài khoản</title>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        .reset-card {
            background: #fff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .reset-card .form-control:focus {
            box-shadow: none;
            border-color: #764ba2;
        }

        .btn-reset {
            background-color: #764ba2;
            border-color: #764ba2;
        }

        .btn-reset:hover {
            background-color: #5a3591;
            border-color: #5a3591;
        }

        .message {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="reset-card">
        <h3 class="text-center mb-4"><i class="bi bi-lock-fill"></i> Quên mật khẩu</h3>
        <p class="text-center text-muted mb-4">Nhập email của bạn để nhận link đặt lại mật khẩu</p>

        <form id="forgotPasswordForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com"
                           required>
                </div>
            </div>

            <button type="submit" class="btn btn-reset w-100">Gửi yêu cầu</button>
            <div id="responseMessage" class="message text-center"></div>
        </form>
    </div>
</div>
<section layout:fragment="scripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            $('#forgotPasswordForm').submit(function (e) {
                e.preventDefault();
                $('#responseMessage').removeClass('text-success text-danger').text('');
                const email = $('#email').val();
                $.ajax({
                    url: '/api/auth/forgot-password',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        email: email
                    }),
                    success: function (resonse) {
                        $('#responseMessage')
                            .removeClass('text-danger')
                            .addClass('text-success')
                            .text(response.message || 'Vui lòng kiểm tra email của bạn.');
                    },
                    error: function (xhr) {
                        let msg = 'Đã xảy ra lỗi.';
                        if (xhr.responseJSON && xhr.responseJSON.message) {
                            msg = xhr.responseJSON.message;
                        }
                        $('#responseMessage')
                            .removeClass('text-success')
                            .addClass('text-danger')
                            .text(msg);
                    }
                })
            });
        });
    </script>
</section>
</body>
</html>
