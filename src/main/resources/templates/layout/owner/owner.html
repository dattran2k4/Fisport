<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner - Fisport</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/web/css/owner-style.css}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>
<body>
<div class="layout-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <a th:href="@{/}">
                    <img alt="Fisport" class="me-2" th:src="@{/web/img/logo.png}" width="35">
                    <span>fisport</span>
                </a>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <nav class="nav-menu">
            <a th:href="@{/owner/dashboard}"
               class="nav-link"
               th:classappend="${currentUri.contains('/dashboard') ? 'active' : ''}">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/owner/fields}"
               class="nav-link"
               th:classappend="${currentUri.contains('/fields') ? 'active' : ''}">
                <i class="fas fa-map-location-dot"></i>
                <span>Manage Fields</span>
            </a>
            <a th:href="@{/owner/bookings}"
               class="nav-link"
               th:classappend="${currentUri.contains('/bookings') ? 'active' : ''}">
                <i class="fas fa-calendar-check"></i>
                <span>Bookings</span>
            </a>
            <a th:href="@{/owner/vouchers}"
               class="nav-link"
               th:classappend="${currentUri.contains('/vouchers') ? 'active' : ''}">
                <i class="fas fa-ticket"></i>
                <span>Vouchers</span>
            </a>
            <a th:href="@{/owner/news}"
               class="nav-link"
               th:classappend="${currentUri.contains('/news') ? 'active' : ''}">
                <i class="fas fa-newspaper"></i>
                <span>News</span>
            </a>
            <a th:href="@{/owner/tournaments}"
               class="nav-link"
               th:classappend="${currentUri.contains('/tournaments') ? 'active' : ''}">
                <i class="fas fa-trophy"></i>
                <span>Tournaments</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <img src="https://i0.wp.com/sangkienvietnam.org/wp-content/uploads/2023/11/avatar-placeholder.gif?ssl=1" alt="Profile" class="profile-img">
                <div class="profile-info">
                    <p class="profile-name" sec:authentication="name">User</p>
                    <p class="profile-role">Owner</p>
                </div>
            </div>
            <a href="#" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title" id="pageTitle">Dashboard</h1>
            </div>
            <div class="top-bar-right">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-wrapper" layout:fragment="content">
            <div th:if="${content.contains('dashboard')}">
                <div th:replace="owner/dashboard :: content"></div>
            </div>
            <div th:if="${content.contains('fields-list')}">
                <div  th:replace="owner/fields/list :: content"></div>
            </div>
            <div th:if="${content.contains('fields-create')}" >
                <div th:replace="owner/fields/create :: content"></div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/web/script/owner-script.js}"></script>
<section layout:fragment="scripts">

</section>
</body>
</html>
