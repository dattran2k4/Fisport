<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Fisport">Fisport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css}" rel="stylesheet">
    <link th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
        }

        .sidebar {
            min-width: 220px;
            max-width: 220px;
            background-color: #f8f9fa;
            transition: all 0.3s;
        }

        .sidebar .nav-link {
            color: #495057;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
            border-radius: 0.375rem;
        }

        .content {
            padding: 2rem;
        }

        .card {
            border-radius: 0.75rem;
        }

        .table-actions button {
            margin-right: 0.5rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -220px;
                z-index: 1000;
            }

            .sidebar.show {
                left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="d-flex">

        <!-- Sidebar -->
        <div id="sidebar" class="sidebar d-flex flex-column p-3">
            <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-decoration-none">
                <span class="fs-4"><i class="bi bi-house-door-fill me-2"></i>Dashboard</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a th:href="@{/user/profile}" class="nav-link" th:classappend="${activePage=='profile'}? ' active'">
                        <i class="bi bi-person-circle me-2"></i>Profile
                    </a>
                </li>
                <li>
                    <a th:href="@{/user/bookings}" class="nav-link"
                        th:classappend="${activePage=='bookings'}? ' active'">
                        <i class="bi bi-calendar-check-fill me-2"></i>My Bookings
                    </a>
                </li>
                <li>
                    <a th:href="@{/user/favorites}" class="nav-link"
                        th:classappend="${activePage=='favorites'}? ' active'">
                        <i class="bi bi-heart-fill me-2"></i>Favorites
                    </a>
                </li>
                <li>
                    <a th:href="@{/user/reviews}" class="nav-link" th:classappend="${activePage=='reviews'}? ' active'">
                        <i class="bi bi-star-fill me-2"></i>Reviews
                    </a>
                </li>
                <li>
                    <a th:href="@{/user/vouchers}" class="nav-link"
                        th:classappend="${activePage=='vouchers'}? ' active'">
                        <i class="bi bi-ticket-perforated-fill me-2"></i>Vouchers
                    </a>
                </li>
                <li>
                    <a th:href="@{/logout}" class="nav-link"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
                </li>
            </ul>
        </div>

        <!-- Main content -->
        <div class="flex-fill">
            <!-- Header -->
            <nav class="navbar navbar-expand-lg navbar-light bg-light px-4">
                <button class="btn btn-outline-primary d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                <div class="ms-auto d-flex align-items-center">
                    <!-- Notification Bell -->
                    <div class="dropdown me-3">
                        <a class="btn btn-outline-secondary position-relative" href="#" role="button"
                            data-bs-toggle="dropdown">
                            <i class="bi bi-bell-fill"></i>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                3
                            </span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#">Booking BK001 is tomorrow</a></li>
                            <li><a class="dropdown-item" href="#">Voucher EXP123 is expiring soon</a></li>
                        </ul>
                    </div>
                    <!-- User info -->
                    <div class="dropdown">
                        <a class="d-flex align-items-center text-decoration-none dropdown-toggle" href="#"
                            data-bs-toggle="dropdown">
                            <img src="/images/user-avatar.png" alt="User" width="32" height="32"
                                class="rounded-circle me-2">
                            <span th:text="${userName}">User Name</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" th:href="@{/}">Web home</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" th:href="@{/logout}">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- Content -->
            <div class="content" layout:fragment="content">

            </div>
        </div>

    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.27/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Toggle sidebar trên mobile
        document.getElementById('sidebarToggle').addEventListener('click', function () {
            document.getElementById('sidebar').classList.toggle('show');
        });

        // Tooltip example
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl);
        });
    </script>
    <section layout:fragment="scripts">

    </section>

</body>

</html>
