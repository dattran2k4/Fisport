<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisport</title>
    <!-- CSS -->
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://unpkg.com/aos@next/dist/aos.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css}" rel="stylesheet">
    <link th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/web/css/style.css}" rel="stylesheet">
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="57x57" th:href="@{/web/favicon/apple-icon-57x57.png}">
    <link rel="apple-touch-icon" sizes="60x60" th:href="@{/web/favicon/apple-icon-60x60.png}">
    <link rel="apple-touch-icon" sizes="72x72" th:href="@{/web/favicon/apple-icon-72x72.png}">
    <link rel="apple-touch-icon" sizes="76x76" th:href="@{/web/favicon/apple-icon-76x76.png}">
    <link rel="apple-touch-icon" sizes="114x114" th:href="@{/web/favicon/apple-icon-114x114.png}">
    <link rel="apple-touch-icon" sizes="120x120" th:href="@{/web/favicon/apple-icon-120x120.png}">
    <link rel="apple-touch-icon" sizes="144x144" th:href="@{/web/favicon/apple-icon-144x144.png}">
    <link rel="apple-touch-icon" sizes="152x152" th:href="@{/web/favicon/apple-icon-152x152.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/web/favicon/apple-icon-180x180.png}">
    <link rel="icon" type="image/png" sizes="192x192"  th:href="@{/web/favicon/android-icon-192x192.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/web/favicon/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="96x96" th:href="@{/web/favicon/favicon-96x96.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/web/favicon/favicon-16x16.png}">
    <link rel="manifest" th:href="@{/web/favicon/manifest.json}">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" th:content="@{/web/favicon/ms-icon-144x144.png}">
    <meta name="theme-color" content="#ffffff">
    <style>
        /* Fallback spacing for fixed header; JS will correct this value at runtime */
        body { padding-top: 72px; }
    </style>
</head>
<body>
    <header th:replace="~{fragments/web/header :: header}"></header>
    <main>
        <!-- Content sẽ được override từ page con -->
        <div layout:fragment="content">
            <!-- default content placeholder -->
        </div>
    </main>

    <!-- JS -->
    <script th:src="@{https://code.jquery.com/jquery-3.7.1.min.js}"></script>
    <script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{https://unpkg.com/aos@next/dist/aos.js}"></script>
    <script th:src="@{https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js}"></script>
    <script th:src="@{https://cdn.jsdelivr.net/npm/sweetalert2@11.7.27/dist/sweetalert2.all.min.js}"></script>
    
    <script>
        // Adjust body padding to match fixed navbar height
        (function() {
            function setBodyOffset() {
                var nav = document.querySelector('nav.navbar.fixed-top');
                var h = nav ? nav.offsetHeight : 0;
                if (h > 0) {
                    document.body.style.paddingTop = h + 'px';
                }
            }
            window.addEventListener('load', setBodyOffset);
            window.addEventListener('resize', setBodyOffset);
            // If Bootstrap collapse changes nav height
            document.addEventListener('shown.bs.collapse', setBodyOffset);
            document.addEventListener('hidden.bs.collapse', setBodyOffset);
        })();
    </script>

    <script>
        AOS.init({ duration: 800, once: true });
    </script>
    <section layout:fragment="scripts"></section>

</body>
</html>
