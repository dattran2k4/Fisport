<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/common}">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow rounded-4">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">
                            <i class="bi bi-person-plus"></i> Đăng ký tài khoản
                        </h3>
                        <div th:if="${success}" class="alert alert-success text-center mb-3" role="alert">
                            <span th:text="${success}"></span>
                        </div>
                        <form th:action="@{/register}" th:object="${register}" method="post">

                            <!-- Username -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person-circle"></i> Tài khoản
                                </label>
                                <input type="text" th:field="*{username}" class="form-control"
                                       placeholder="Nhập tài khoản">
                                <div class="text-danger small" th:if="${#fields.hasErrors('username')}"
                                     th:errors="*{username}"></div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-lock"></i> Mật khẩu
                                </label>
                                <input type="password" th:field="*{password}" class="form-control"
                                       placeholder="Nhập mật khẩu">
                                <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}"></div>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-shield-lock"></i> Xác nhận mật khẩu
                                </label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control"
                                       placeholder="Nhập lại mật khẩu">
                                <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}"
                                     th:errors="*{confirmPassword}"></div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-envelope"></i> Email
                                </label>
                                <input type="email" th:field="*{email}" class="form-control"
                                       placeholder="Nhập email của bạn">
                                <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}"></div>
                            </div>

                            <!-- Phone -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-telephone"></i> Số điện thoại
                                </label>
                                <input type="text" th:field="*{phone}" class="form-control"
                                       placeholder="Nhập số điện thoại">
                                <div class="text-danger small" th:if="${#fields.hasErrors('phone')}"
                                     th:errors="*{phone}"></div>
                            </div>

                            <!-- Birthday -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-calendar-date"></i> Ngày sinh
                                </label>
                                <input type="date" th:field="*{birthday}" class="form-control">
                                <div class="text-danger small" th:if="${#fields.hasErrors('birthday')}"
                                     th:errors="*{birthday}"></div>
                            </div>

                            <!-- Gender -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-gender-ambiguous"></i> Giới tính
                                </label>
                                <div class="d-flex gap-4 mt-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{gender}"
                                               value="MALE" id="male">
                                        <label class="form-check-label" for="male">Nam</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" th:field="*{gender}"
                                               value="FEMALE" id="female">
                                        <label class="form-check-label" for="female">Nữ</label>
                                    </div>
                                </div>
                                <div class="text-danger small" th:if="${#fields.hasErrors('gender')}"
                                     th:errors="*{gender}"></div>
                            </div>

                            <!-- Submit -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary rounded-pill">
                                    <i class="bi bi-check-circle"></i> Đăng ký
                                </button>
                            </div>

                            <!-- Link to login -->
                            <div class="text-center mt-3">
                                <small>Bạn đã có tài khoản?
                                    <a th:href="@{/login}" class="text-decoration-none">Đăng nhập</a>
                                </small>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
