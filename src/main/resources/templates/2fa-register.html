<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/common}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <!-- Flash success -->
                <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${success}"></span>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4 text-center">Xác thực 2FA</h4>

                        <!-- QR Code -->
                        <div class="text-center mb-4" th:if="${qrCode}">
                            <p>Quét mã QR bằng Google Authenticator</p>
                            <img th:src="${qrCode}" alt="QR Code" class="img-fluid rounded shadow-sm">
                        </div>

                        <!-- Form nhập OTP -->
                        <form th:action="@{/2fa-register}" th:object="${request}" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Tên tài khoản</label>
                                <input type="text" th:field="*{username}" class="form-control" readonly>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mã OTP <i class="bi bi-key-fill"></i></label>
                                <input type="text" th:field="*{code}" class="form-control" placeholder="Nhập mã OTP"
                                       required>
                                <div th:if="${#fields.hasErrors('code')}" class="text-danger mt-1"
                                     th:errors="*{code}"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-shield-lock-fill me-1"></i> Xác nhận
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
