<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="container">
    <div class="login-container">
        <h3 class="text-center mb-4">Sign In</h3>
        <form th:action="@{/login}" th:object="${request}" method="post" novalidate>

            <!-- Username -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-user"></i></span>
                    <input type="text" th:field="*{username}" id="username" class="form-control" placeholder="Username"
                           required>
                </div>
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-lock"></i></span>
                    <input type="password" th:field="*{password}" id="password" class="form-control"
                           placeholder="Password" required>
                </div>
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary login-btn">Login</button>
        </form>

        <p class="mt-3 text-center text-muted">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>
</body>
</html>
