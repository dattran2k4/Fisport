<!DOCTYPE html>
<html lang="vn" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/web/web}">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết trận đấu</title>
    <style>
        body { background-color: #f8f9fa; }
        .card-header { font-weight: 600; font-size: 1.25rem; }
        .progress { height: 20px; border-radius: 12px; }
        .participant-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .creator-info img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .badge-status { font-size: 0.85rem; font-weight: 500; }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="container py-4">
            <div class="row">
                <!-- Main Match Info -->
                <div class="col-lg-8 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h3 class="card-header">Sunday Football Match</h3>
                                <span class="badge bg-warning text-dark badge-status">PENDING</span>
                            </div>
                            <p><i class="bi bi-card-text"></i> Friendly match</p>
                            <p><i class="bi bi-geo-alt"></i> Ward 1, City A</p>
                            <p><i class="bi bi-calendar"></i> 25-10-2025 | <i class="bi bi-clock"></i> 17:00 - 18:00</p>
                            <p><i class="bi bi-currency-dollar"></i> 100,000 VND</p>
                            <p><i class="bi bi-people"></i> 2 / 4 players</p>
                            <p><i class="bi bi-trophy"></i> Football</p>

                            <!-- Progress bar -->
                            <div class="progress mb-3">
                                <div class="progress-bar bg-success" role="progressbar" style="width:50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>

                            <!-- Join / Cancel / Payment Buttons -->
                            <div class="d-flex gap-2">
                                <button class="btn btn-success flex-fill"><i class="bi bi-person-plus"></i> Join Match</button>
                                <button class="btn btn-danger flex-fill"><i class="bi bi-x-circle"></i> Cancel</button>
                                <button class="btn btn-primary flex-fill"><i class="bi bi-wallet2"></i> Pay</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Creator Info + Participants -->
                <div class="col-lg-4 mb-4">
                    <div class="card shadow-sm mb-3">
                        <div class="card-body text-center creator-info">
                            <h5>Nguyen Van A</h5>
                            <p>@creatorName</p>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Participants</h5>
                            <ul class="list-unstyled">
                                <li class="d-flex align-items-center mb-2">
                                    <span>Player 1</span>
                                    <span class="badge bg-success ms-auto">ACCEPTED</span>
                                </li>
                                <li class="d-flex align-items-center mb-2">
                                    <span>Player 2</span>
                                    <span class="badge bg-warning text-dark ms-auto">PENDING</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
