<!DOCTYPE html>
<html lang="vn"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: #ffffff;
            border-radius: 1rem;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.8s ease-out;
        }

        .success-icon {
            font-size: 4rem;
            color: #28a745;
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            70% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .success-text {
            color: #6c757d;
            margin: 1rem 0 2rem 0;
        }

        .btn-home {
            border-radius: 50px;
            padding: 0.6rem 2rem;
            font-weight: 500;
            background: #28a745;
            color: #fff;
            transition: all 0.3s;
        }

        .btn-home:hover {
            background: #218838;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
<div class="success-card">
    <i class="bi bi-check-circle-fill success-icon"></i>
    <h2 class="success-title">Thanh toán thành công!</h2>
    <p class="success-text">Cảm ơn bạn đã thanh toán. Dưới đây là thông tin chi tiết giao dịch của bạn.</p>

    <div class="transaction-details">
        <div class="row">
            <div class="col-5 label">Mã giao dịch:</div>
            <div class="col-7 value" th:text="${response.transactionId}">VN12345678</div>
        </div>
        <div class="row">
            <div class="col-5 label">Số tiền:</div>
            <div class="col-7 value"
                 th:text="${#numbers.formatDecimal(response.amount, 0, 'COMMA', 2, 'POINT')} + ' ₫'">500,000 ₫
            </div>
        </div>
        <div class="row">
            <div class="col-5 label">Phương thức:</div>
            <div class="col-7 value" th:text="${response.method}">VNPAY</div>
        </div>
        <div class="row">
            <div class="col-5 label">Trạng thái:</div>
            <div class="col-7 value">
                <span th:text="${response.status}"
                      th:classappend="${response.status.name() == 'SUCCESS' ? 'text-success' : 'text-danger'}">SUCCESS</span>
            </div>
        </div>
        <div class="row">
            <div class="col-5 label">Thời gian:</div>
            <div class="col-7 value" th:text="${#temporals.format(response.paymentAt, 'dd/MM/yyyy HH:mm:ss')}">
                15/10/2025 19:45
            </div>
        </div>
    </div>

    <a href="/user/bookings" class="btn btn-home"><i class="bi bi-house-door"></i> Trở về danh sách bookings</a>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
