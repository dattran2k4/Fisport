<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/web/web}">

<head>
    <title>Đặt sân nhanh chóng</title>
    <style>
        .card {
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        h4.section-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
            border-left: 4px solid #0d6efd;
            padding-left: .6rem;
        }

        /* ========== DATE PICKER ========== */
        .date-picker {
            border: 2px solid #0d6efd !important;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .date-picker:focus {
            box-shadow: 0 0 5px rgba(13, 110, 253, 0.5);
            border-color: #0d6efd;
        }

        /* ========== TIME SLOT BUTTONS ========== */
        .time-slot-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time-slot {
            flex: 0 0 calc(25% - 10px);
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
            background-color: #f8f9fa;
            transition: all 0.2s ease;
        }

        .time-slot:hover {
            background-color: #e9f2ff;
        }

        .time-slot.active {
            border-color: #0d6efd;
            background-color: #0d6efd;
            color: white;
            font-weight: 600;
        }

        /* ========== SERVICE LIST ========== */
        .list-group-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: none !important;
            border-bottom: 1px solid #eee !important;
            padding: 0.75rem 0;
        }

        .list-group-item:last-child {
            border-bottom: none;
        }

        .service-qty {
            width: 80px !important;
            text-align: center;
            border-radius: 6px;
        }

        .service-price,
        .service-total {
            font-weight: 600;
        }

        .service-total {
            color: #0d6efd;
        }

        /* ========== PRICE SUMMARY ========== */
        #price-summary {
            margin-top: 20px;
        }

        #price-summary .card {
            border-left: 5px solid #198754;
            padding: 12px 16px;
            background: #f8fff8;
        }

        #price-summary .price-line {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 4px;
        }

        #price-summary .price-total {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0d6efd;
        }

        /* ========== BUTTONS ========== */
        .btn-primary {
            border-radius: 10px;
            padding: 10px 18px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="container mt-4">

            <h2>Đặt sân: <span th:text="${field.name}"></span></h2>
            <p>Địa chỉ: <span th:text="${field.address + ', ' + field.ward + ', ' + field.city}"></span></p>
            <!-- Lỗi chung -->
            <div th:if="${error != null}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            <form th:action="@{/booking}" th:object="${booking}" method="POST" id="bookingForm">
                <!-- CSRF nếu dùng Spring Security -->
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> -->

                <!-- 8 ngày + calendar picker -->
                <div class="d-flex flex-wrap mb-3" id="day-container"></div>
                <div class="mb-3">
                    <input type="date" class="form-control" id="customDate">
                </div>

                <!-- Subfields -->
                <div class="mb-3">
                    <label class="form-label fw-semibold mb-2">Chọn sân con:</label>
                    <div class="list-group">
                        <label
                            class="list-group-item d-flex justify-content-between align-items-center border rounded-3 mb-2"
                            th:each="sub, iter : ${subField}">
                            <span th:text="${sub.name}" class="fw-medium text-dark">Sân bóng</span>
                            <input type="radio" class="form-check-input subfield-radio" th:field="*{subFieldId}"
                                th:value="${sub.id}" />
                        </label>
                    </div>
                </div>

                <!-- Khung giờ bắt đầu -->
                <div class="mb-3">
                    <label>Các khung giờ có thể chọn:</label>
                    <div class="d-flex flex-wrap" id="hours-container"></div>
                </div>

                <!-- Durations -->
                <div id="durationContainer" class="mt-3"></div>

                <!-- Field Service Items (giữ nguyên layout) -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Dịch vụ kèm theo:</label>
                    <div class="list-group">
                        <div class="list-group-item d-flex align-items-center justify-content-between"
                            th:each="item, iter : ${items}">
                            <!-- ITEM NAME -->
                            <div>
                                <input class="form-check-input me-2 service-checkbox" type="checkbox"
                                    th:id="${'item-' + item.id}" th:value="${item.serviceItemId}"
                                    th:data-index="${iter.index}" />
                                <label class="form-check-label" th:for="${'item-' + item.id}">
                                    <span th:text="${item.serviceItemName}"></span>
                                    <small class="text-muted" th:text="'(' + ${item.serviceName} + ')'"></small>
                                </label>
                            </div>
                            <!-- ITEM PRICE -->
                            <div class="text-end d-flex align-items-center gap-2">
                                <input type="number" class="form-control form-control-sm service-qty" min="1"
                                    th:max="${item.quantity}" value="1" style="width: 70px; display: none;"
                                    th:data-index="${iter.index}">
                                <span th:data-price="${item.price}" class="text-success fw-bold service-price"
                                    th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                                <span class="ms-2 fw-semibold service-total" th:data-price="${item.price}"
                                    th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + '₫'"></span>
                            </div>
                        </div>
                    </div>
                    <div id="service-hidden-inputs"></div>
                    <div id="price-summary" class="mt-3">
                        <div id="pricePreview" class="fs-5 fw-bold text-success" style="display:none;"></div>
                        <div id="servicesTotal" class="fs-6 fw-bold text-success" style="display:none;"></div>
                        <div id="grandTotal" class="fs-5 fw-bold text-primary" style="display:none;"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-success"><i class="fa fa-check"></i> Đặt sân</button>

                <!-- Hidden fields để Spring bind -->
                <input type="hidden" th:field="*{startTime}" id="startTime">
                <input type="hidden" th:field="*{endTime}" id="endTime">
                <input type="hidden" th:field="*{duration}" id="duration">
                <input type="hidden" th:field="*{date}" id="date">
                <input type="hidden" th:field="*{subFieldId}" id="subFieldId">
                <!-- Lưu fieldTypeId để gọi API durations -->
                <input type="hidden" id="fieldTypeId" th:value="${field.typeId}">
            </form>
        </div>
    </div>
    <section layout:fragment="scripts">
        <script th:inline="javascript">
            $(document).ready(function () {
                const dayContainer = $('#day-container');
                const hoursContainer = $('#hours-container');
                let selectedDate = null;
                let selectedSubFieldId = null;
                const API_BASE = '/api/v1/bookings/occupied';
                 let pricePreviewVal = 0;

                const openTime = /*[[${field.openTime != null ? field.openTime : '06:00'}]]*/ '06:00';
                const closeTime = /*[[${field.closeTime != null ? field.closeTime : '18:00'}]]*/ '18:00';

                // Render 8 ngày
                for (let i = 0; i < 8; i++) {
                    let date = new Date();
                    date.setDate(date.getDate() + i);

                    let iso = date.toISOString().slice(0, 10); // yyyy-mm-dd
                    let label = `${date.toLocaleDateString('vi-VN', { weekday: 'short' })} ${date.getDate()}/${date.getMonth() + 1}`;

                    let btn = $('<button>')
                        .attr('type', 'button')
                        .addClass('btn btn-outline-primary me-2 mb-2 day-btn')
                        .data('date', iso)
                        .text(label);

                    dayContainer.append(btn);
                }

                // Khi click chọn ngày
                $(document).on('click', '.day-btn', function () {
                    $('.day-btn').removeClass('active');
                    $(this).addClass('active');
                    selectedDate = $(this).data('date');
                    $('#date').val(selectedDate); // cập nhật hidden date
                    console.log(selectedDate);
                    if (selectedSubFieldId) renderHours(selectedDate, selectedSubFieldId);
                });

                // Khi chọn ngày bằng calendar picker
                $('#customDate').on('change', function () {
                    selectedDate = $(this).val();
                    // làm nổi bật nếu trùng format yyyy-mm-dd
                    $('.day-btn').removeClass('active');
                    $('#date').val(selectedDate);
                    if (selectedSubFieldId) renderHours(selectedDate, selectedSubFieldId);
                });

                // Khi chọn sân con (radio)
                $(document).on('change', '.subfield-radio', function () {
                    selectedSubFieldId = $(this).val();
                    $('#subFieldId').val(selectedSubFieldId); // cập nhật hidden subFieldId
                    $('.subfield-radio').not(this).prop('checked', false);
                    console.log(selectedSubFieldId);
                    if (selectedDate) renderHours(selectedDate, selectedSubFieldId);
                });

                /**
                 * Render các khung giờ và disable các giờ đã được đặt
                 * date: yyyy-MM-dd
                 * subFieldId: number
                 */
                function renderHours(date, subFieldId) {
                    const container = $('#hours-container');
                    container.empty().append('<div class="text-muted">Đang tải giờ...</div>');


                    if (!date || !subFieldId) {
                        container.empty().append('<div class="text-muted">Vui lòng chọn ngày và sân con.</div>');
                        return;
                    }

                    $.getJSON(`${API_BASE}?subFieldId=${subFieldId}&date=${date}`)
                        .done(function (response) {
                            // Lấy thời gian hiện tại
                            const today = new Date();
                            const selectedDateObj = new Date(date);
                            const isToday = selectedDateObj.toDateString() === today.toDateString();
                            const currentHour = today.getHours();
                            const bookedSlots = (response && response.data) ? response.data : [];
                            container.empty();

                            const openHour = parseInt(openTime.split(':')[0]);
                            const closeHour = parseInt(closeTime.split(':')[0]);

                            for (let minutes = openHour * 60; minutes < closeHour * 60; minutes += 30) {
                                const h = Math.floor(minutes / 60);
                                const m = minutes % 60;
                                const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                                const btn = $('<button>')
                                    .attr('type', 'button')
                                    .addClass('btn btn-outline-primary hour-btn px-3 py-2')
                                    .text(timeStr)
                                    .data('hour', h)
                                    .data('time', timeStr);

                                // kiểm tra theo phút chính xác
                                let matchedSlot = null;
                                for (const slot of bookedSlots) {
                                    const [startH, startM] = (slot.startTime || '00:00').split(':').map(Number);
                                    const [endH, endM] = (slot.endTime || '00:00').split(':').map(Number);

                                    const startMinutes = startH * 60 + startM;
                                    const endMinutes = endH * 60 + endM;

                                    if (minutes >= startMinutes && minutes < endMinutes) {
                                        matchedSlot = slot;
                                        break;
                                    }
                                }

                                if (matchedSlot) {
                                    btn.prop('disabled', true)
                                        .addClass('text-muted text-decoration-line-through')
                                        .append(' ❌');

                                    if (matchedSlot.bookingStatus === 'pending') {
                                        btn.removeClass('btn-outline-primary').addClass('btn-warning');
                                    } else if (matchedSlot.bookingStatus === 'paid') {
                                        btn.removeClass('btn-outline-primary').addClass('btn-danger text-white');
                                    }
                                } else if (isToday && minutes < currentHour * 60) {
                                    // Nếu giờ đã qua hôm nay
                                    btn.prop('disabled', true)
                                        .addClass('text-muted text-decoration-line-through')
                                        .append(' ⏰');
                                }

                                container.append(btn);
                            }

                            if ((bookedSlots || []).length === 0) {
                                console.log('Tất cả giờ trống.');
                            } else {
                                console.log('Giờ bị đặt:', bookedSlots);
                            }
                        })
                        .fail(function () {
                            container.empty().append('<div class="text-danger">Không thể tải dữ liệu giờ.</div>');
                        });
                }

                // Khi click chọn 1 mốc giờ (dùng delegation vì button tạo động)
                $(document).on('click', '.hour-btn:not(:disabled)', function () {
                    // highlight visually
                    $('.hour-btn').removeClass('active btn-success text-white');
                    $(this).addClass('active btn-success text-white');

                    const timeStr = $(this).data('time'); // "08:00"
                    $('#startTime').val(timeStr); // set hidden startTime
                    console.log(timeStr);

                    // lấy fieldTypeId để gọi API durations
                    const fieldTypeId = $('#fieldTypeId').val();
                    if (!fieldTypeId) {
                        console.error('Không tìm thấy fieldTypeId');
                        return;
                    }

                    // call durations API
                    $.getJSON(`/api/v1/sub-fields/${selectedSubFieldId}/available-durations`, {
                        date: selectedDate,
                        startTime: timeStr
                    })
                        .done(function (resp) {
                            const durations = (resp && resp.data) ? resp.data : resp; // accommodate different shapes
                            const container = $('#durationContainer');
                            container.empty();

                            // render buttons durations
                            durations.forEach(minutes => {
                                const btn = $('<button>')
                                    .addClass('btn btn-outline-primary m-1 duration-btn')
                                    .data('minutes', minutes)
                                    .text(`${minutes} phút`)
                                    .attr('type', 'button');

                                container.append(btn);
                            });
                        })
                        .fail(function () {
                            console.error('Lỗi khi tải durations');
                            $('#durationContainer').empty().append('<div class="text-danger">Lỗi tải thời lượng.</div>');
                        });
                });

                // Khi chọn duration -> set duration, endTime
                $(document).on('click', '.duration-btn', function () {
                    $('.duration-btn').removeClass('active btn-primary text-white');
                    $(this).addClass('active btn-primary text-white');

                    const minutes = parseInt($(this).data('minutes'));
                    const start = $('#startTime').val(); // "08:00"
                    if (!start || isNaN(minutes)) {
                        return;
                    }

                    // set duration (minutes) và endTime
                    $('#duration').val(minutes);

                    // compute endTime HH:mm
                    const [h, m] = start.split(':').map(Number);
                    const startMinutes = h * 60 + m;
                    const endMinutes = startMinutes + minutes;
                    const endH = Math.floor(endMinutes / 60);
                    const endM = endMinutes % 60;
                    const endTime = `${String(endH).padStart(2, '0')}:${String(endM).padStart(2, '0')}`;

                    $('#endTime').val(endTime);

                    //Dynamic time pricing
                    const fieldId = /*[[${field.id}]]*/ 0;


                    $.ajax({
                        url: `/api/v1/bookings/preview-timingPrice?fieldId=${fieldId}&startTime=${start}&endTime=${endTime}`,
                        method: 'GET',
                        success: function (response) {
                            pricePreviewVal = response.data || 0;

                            // Nếu chưa có vùng hiển thị giá thì tạo mới
                            //if ($('#pricePreview').length === 0) {
                            //    $('#durationContainer').after('<div id="pricePreview" class="mt-3 fs-5 fw-bold text-success"></div>');
                            //}

                            $('#pricePreview').text(`💰 Giá tạm tính: ${pricePreviewVal.toLocaleString()}₫`).show();

                            updateAllTotals();
                        },
                        error: function (xhr) {
                            pricePreviewVal = 0;
                            $('#pricePreview').text('Không thể tính giá.').show();
                            updateAllTotals();
                        }
                    });
                });

                // Show/hide số lượng khi chọn checkbox
                $(document).on('change', '.service-checkbox', function () {
                    const qtyInput = $(this).closest('.list-group-item').find('.service-qty');
                    if ($(this).is(':checked')) qtyInput.show();
                    else qtyInput.hide();
                });


                // Hàm định dạng giá (dùng dấu phẩy ngăn cách nghìn)
                function formatCurrency(value) {
                    if (isNaN(value) || value === null) return '0₫';
                    return value.toLocaleString('vi-VN') + '₫';
                }

                function getUnitPrice(itemEl) {
                    const priceAttr = itemEl.find('.service-price').data('price');
                    // ensure number
                    return parseFloat(priceAttr) || 0;
                }

                // Cập nhật tổng cho một item (hiển thị)
                function updateServiceTotal(itemEl) {
                    const unitPrice = getUnitPrice(itemEl);
                    const qty = parseInt(itemEl.find('.service-qty').val()) || 0;
                    const total = unitPrice * qty;
                    itemEl.find('.service-total').data('total', total).text(formatCurrency(total));
                }

                // Tính tổng tất cả service đã chọn
                function calculateServicesTotal() {
                    let sum = 0;
                    $('.list-group-item').each(function () {
                        const itemEl = $(this);
                        if (itemEl.find('.service-checkbox').is(':checked')) {
                            let t = parseFloat(itemEl.find('.service-total').data('total')) || 0;
                            sum += t;
                        }
                    });
                    return sum;
                }

                // Update tất cả vùng hiển thị giá: pricePreview, servicesTotal, grandTotal
                function updateAllTotals() {

                    const servicesTotalVal = calculateServicesTotal();
                    if (servicesTotalVal > 0) $('#servicesTotal').show().text('💼 Dịch vụ: ' + formatCurrency(servicesTotalVal));
                    else $('#servicesTotal').hide().text('');

                    const grand = (pricePreviewVal || 0) + (servicesTotalVal || 0);
                    if (grand > 0) $('#grandTotal').show().text('💰 Tổng: ' + formatCurrency(grand));
                    else $('#grandTotal').hide().text('');
                }


                // Khi check/uncheck checkbox
                $(document).on('change', '.service-checkbox', function () {
                    const itemEl = $(this).closest('.list-group-item');
                    const qtyInput = itemEl.find('.service-qty');
                    if ($(this).is(':checked')) {
                        qtyInput.show();
                    } else {
                        qtyInput.hide();
                        qtyInput.val(1); // reset về 1 khi bỏ chọn
                    }
                    // cập nhật hiển thị total cho item
                    updateServiceTotal(itemEl);
                    updateAllTotals();
                });

                // Khi thay đổi số lượng
                $(document).on('input', '.service-qty', function () {
                    const itemEl = $(this).closest('.list-group-item');
                    // guard min
                    const min = parseInt($(this).attr('min')) || 1;
                    let val = parseInt($(this).val()) || min;
                    if (val < min) { val = min; $(this).val(val); }
                    updateServiceTotal(itemEl);
                    updateAllTotals();
                });

                // Khi submit form, tạo hidden input cho Spring bind
                $('#bookingForm').on('submit', function () {
                    $('#service-hidden-inputs').empty();
                    $('.service-checkbox:checked').each(function (i) {
                        const serviceId = $(this).val();
                        const qty = $(this).closest('.list-group-item').find('.service-qty').val() || 1;
                        $('#service-hidden-inputs').append(
                            `<input type="hidden" name="bookingServiceItemRequest[${i}].fieldServiceItemId" value="${serviceId}">` +
                            `<input type="hidden" name="bookingServiceItemRequest[${i}].quantity" value="${qty}">`
                        );
                    });
                });
                // === NOTE: JS xử lý service-checkbox & service-qty (thêm hidden inputs)
            });
        </script>
    </section>

</body>

</html>
