<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/web/web}">
<head>
    <title>Thanh toán</title>
    <style>
        .payment-wrap {
            background-color: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .payment-container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 380px;
            padding: 30px;
            text-align: center;
        }

        .payment-container h2 {
            margin-bottom: 20px;
            font-size: 20px;
            color: #333;
        }

        .payment-method {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-method:hover {
            border-color: #6c5dd3;
            background-color: #f5f5ff;
        }

        .payment-method.selected {
            border-color: #6c5dd3;
            background-color: #f0f0ff;
        }

        .payment-method img {
            width: 36px;
            height: auto;
            margin-right: 12px;
        }

        .payment-method span {
            flex-grow: 1;
            text-align: left;
            font-size: 16px;
            color: #333;
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: #6c5dd3;
            color: #fff;
            flex: 1;
            margin-right: 10px;
        }

        .btn-primary:hover {
            background-color: #5a4dcf;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover {
            background-color: #d5d5d5;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="payment-wrap">
        <div class="payment-container">
            <h2>Select payment method</h2>

            <div id="methods">
                <div th:each="method : ${methods}" class="payment-method"
                     th:data-method="${method.name().toLowerCase()}">
                    <img th:src="|/web/img/payment/${method.name().toLowerCase()}.png|" alt=""/>
                    <span th:text="'Pay with ' + ${method}"></span>
                </div>
            </div>

            <div class="btn-container">
                <button class="btn btn-secondary" onclick="window.history.back()">Go Back</button>
                <button class="btn btn-primary" id="continueBtn">Continue</button>
            </div>
        </div>
    </div>
</div>
<section layout:fragment="scripts">
    <script th:inline="javascript">
        $(document).ready(function () {
            const paymentToken = /*[[${paymentToken}]]*/ 'dummyToken';
            let selectedMethod = null;

            // Chọn phương thức
            $('.payment-method').click(function () {
                $('.payment-method').removeClass('selected');
                $(this).addClass('selected');
                selectedMethod = $(this).data('method');
            });

            // Continue
            $('#continueBtn').click(function () {
                if (!selectedMethod) {
                    alert("Please select a payment method");
                    return;
                }

                $.ajax({
                    url: '/api/payment/create-payment',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        paymentToken: paymentToken,
                        paymentMethod: selectedMethod
                    }),
                    success: function (res) {
                        const paymentUrl = res.data; // API trả trực tiếp URL
                        window.open(paymentUrl, 'Thanh toán', 'width=700,height=900');
                    },
                    error: function (xhr) {
                        alert("Có lỗi xảy ra: " + (xhr.responseJSON?.message || xhr.statusText) + res.message);
                    }
                });
            });
        });
    </script>
</section>
</body>
</html>
