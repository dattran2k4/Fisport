<!DOCTYPE html>
<html
        lang="vn"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{layout/web/web}"
>
<head>
    <title>Trang chủ</title>
    <style>
        .promotion-card {
            transition: transform 0.3s, box-shadow 0.3s;
            border-radius: 1rem;
        }

        .promotion-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .promotion-card .card-body i {
            flex-shrink: 0;
        }

        .custom-swiper-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .top-fields-prev {
            left: -12px;
        }

        .top-fields-next {
            right: -12px;
        }

        .nav-circle {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 36px;
            height: 36px;
            background-color: #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            color: #0d6efd;
        }

        .nav-circle:hover {
            background-color: #0d6efd;
            color: #ffffff;
        }

        @media (max-width: 768px) {
            .nav-circle {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .top-fields-prev {
                left: -8px;
            }

            .top-fields-next {
                right: -8px;
            }
        }
    </style>
</head>

<body>
<div layout:fragment="content">
    <!-- Hero / Banner with background Swiper and overlayed text -->
    <section
            class="py-5 bg-light position-relative overflow-hidden"
            data-aos="fade-up"
            style="min-height: 420px"
    >
        <!-- Background Swiper -->
        <div class="position-absolute top-0 start-0 w-100 h-100">
            <div class="swiper hero-swiper w-100 h-100">
                <div class="swiper-wrapper">
                    <div
                            class="swiper-slide w-100 h-100"
                            style="
                  background: url('/web/img/banner/badminton.png') center/cover
                    no-repeat;
                "
                    ></div>
                    <div
                            class="swiper-slide w-100 h-100"
                            style="
                  background: url('/web/img/banner/football.png') center/cover
                    no-repeat;
                "
                    ></div>
                    <div
                            class="swiper-slide w-100 h-100"
                            style="
                  background: url('/web/img/banner/pickleball.png') center/cover
                    no-repeat;
                "
                    ></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <!-- Dark overlay for readability -->
            <div
                    class="position-absolute top-0 start-0 w-100 h-100"
                    style="background: rgba(0, 0, 0, 0.35)"
            ></div>
        </div>

        <!-- Foreground content -->
        <div class="container position-relative" style="z-index: 2">
            <div class="row">
                <div class="col-lg-8 col-xl-7">
                    <h1 class="display-5 fw-bold mb-3 text-white">
                        Fisport - Đặt sân thể thao hiện đại
                    </h1>
                    <p class="lead mb-4 text-white-50">
                        Trải nghiệm đặt sân trực tuyến nhanh chóng, mượt mà, phù hợp mọi
                        nhu cầu luyện tập và thi đấu.
                    </p>
                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-primary btn-lg"
                        ><i class="bi bi-geo-alt"></i> Tìm kiếm sân thể thao</a
                        >
                        <a href="#" class="btn btn-outline-light btn-lg"
                        ><i class="bi bi-lightning"></i> Khám phá ưu đãi</a
                        >
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Quick search (refined UI/UX) -->
    <section
            class="py-4 border-bottom"
            data-aos="fade-up"
            data-aos-delay="50"
    >
        <div class="container">
            <div class="search-bar bg-white shadow-sm rounded-4 p-3 p-md-4">
                <form
                        id="quickSearchForm"
                        class="row g-3 g-md-2 align-items-stretch"
                >
                    <div class="col-12 col-md-3">
                        <label for="fieldTypeSelect" class="visually-hidden"
                        >Loại sân</label
                        >
                        <div class="input-group input-group-lg">
                  <span class="input-group-text"
                  ><i class="bi bi-grid"></i
                  ></span>
                            <select
                                    class="form-select"
                                    id="fieldTypeSelect"
                                    name="fieldType"
                            >
                                <option selected disabled value="">Chọn loại sân</option>
                                <option
                                        th:each="ft : ${fieldTypes}"
                                        th:value="${ft.id}"
                                        th:text="${ft.name}"
                                        th:attr="data-slug=${ft.slug}"
                                ></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <label for="citySelect" class="visually-hidden"
                        >Tỉnh/Thành phố</label
                        >
                        <div class="input-group input-group-lg">
                  <span class="input-group-text"
                  ><i class="bi bi-geo-alt"></i
                  ></span>
                            <select class="form-select" id="citySelect" name="city">
                                <option selected disabled value="">
                                    Chọn tỉnh/thành phố
                                </option>
                                <option
                                        th:each="c : ${cities}"
                                        th:value="${c.id}"
                                        th:data-name="${c.slug}"
                                        th:text="${c.name}"
                                ></option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 col-md-3">
                        <label for="wardSelect" class="visually-hidden"
                        >Phường/Xã</label
                        >
                        <div class="input-group input-group-lg">
                  <span class="input-group-text"
                  ><i class="bi bi-geo"></i
                  ></span>
                            <select class="form-select" id="wardSelect" disabled>
                                <option selected disabled value="">Chọn phường/xã</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12 col-md-2 d-grid">
                        <button
                                type="submit"
                                id="btnSearch"
                                class="btn btn-primary btn-lg btn-search w-100"
                                disabled
                                title="Chọn loại sân và tỉnh/thành phố"
                        >
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Promotions Section -->
    <section
            id="promotions"
            class="py-5"
            data-aos="fade-up"
            data-aos-delay="100"
    >
        <div class="container">
            <h2 class="h4 mb-4 text-center">Ưu đãi</h2>
            <div class="row g-4">
                <!-- Loop vouchers using Thymeleaf -->
                <div class="col-md-4" th:each="voucher : ${vouchers}">
                    <div class="card promotion-card h-100 shadow-sm border-0">
                        <div
                                class="card-body d-flex flex-column justify-content-between"
                        >
                            <div class="d-flex align-items-center mb-3">
                                <i class="bi bi-gift-fill fs-3 text-primary me-3"></i>
                                <h5 class="card-title mb-0" th:text="${voucher}">
                                    Voucher description
                                </h5>
                            </div>
                            <a href="#" class="btn btn-outline-primary mt-auto"
                            >Nhận ngay</a
                            >
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- All fields carousel -->
    <section class="py-5" data-aos="fade-up" data-aos-delay="150">
        <div class="container">
            <!-- Header + Filter Buttons -->
            <div
                    class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2"
            >
                <h2 class="h5 mb-0">Tất cả sân thể thao</h2>
                <div class="d-flex align-items-center gap-2">
                    <div class="btn-group btn-group-sm"
                         role="group"
                         id="topFieldTypeFilters">
                        <!-- Nút Tất cả -->
                        <button
                                type="button"
                                class="btn btn-outline-primary active"
                                data-id=""
                        >
                            <i class="fas fa-th-large me-1"></i> Tất cả
                        </button>

                        <button type="button"
                                class="btn btn-outline-primary"
                                th:each="type : ${fieldTypes}"
                                th:data-type="${type.slug}"
                                th:data-id="${type.id}">
                            <i
                                    th:class="'me-1 ' + (
                                    ${type.slug} == 'bong-da'     ? 'fa-solid fa-futbol' : (
                                    ${type.slug} == 'cau-long'    ? 'fa-solid fa-feather-pointed' : (
                                    ${type.slug} == 'tennis'      ? 'fa-solid fa-table-tennis-paddle-ball' : (
                                    ${type.slug} == 'bong-ro'     ? 'fa-solid fa-basketball' : (
                                    ${type.slug} == 'boi-loi'     ? 'fa-solid fa-person-swimming' : (
                                    ${type.slug} == 'pickleball'  ? 'fa-solid fa-table-tennis-paddle-ball' : 'fa-regular fa-star'))))))"
                            ></i>
                            <span th:text="${type.name}"></span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="swiper top-fields-swiper position-relative">
                <div class="swiper-wrapper" id="topFieldsWrapper">
                    <!-- Slide -->
                </div>
                <!-- Nút prev/next tròn với icon font -->
                <div class="top-fields-prev custom-swiper-nav">
              <span class="nav-circle"
              ><i class="fas fa-chevron-left"></i
              ></span>
                </div>
                <div class="top-fields-next custom-swiper-nav">
              <span class="nav-circle"
              ><i class="fas fa-chevron-right"></i
              ></span>
                </div>
            </div>
        </div>
    </section>
</div>
<section layout:fragment="scripts">
    <script>
        $(document).ready(function () {

            // Init Swiper
            var heroSwiper = new Swiper(".hero-swiper", {
                loop: true,
                autoplay: {delay: 3500, disableOnInteraction: false},
                pagination: {
                    el: ".hero-swiper .swiper-pagination",
                    clickable: true,
                },
            });

            var topFieldsSwiper = new Swiper(".top-fields-swiper", {
                loop: false,
                slidesPerView: 5,
                spaceBetween: 20,
                grabCursor: false,
                watchOverflow: true,
                allowTouchMove: false,
                breakpoints: {
                    320: {slidesPerView: 1, spaceBetween: 10},
                    576: {slidesPerView: 3, spaceBetween: 14},
                    768: {slidesPerView: 4, spaceBetween: 14},
                    992: {slidesPerView: 5, spaceBetween: 16},
                    1200: {slidesPerView: 5, spaceBetween: 16},
                },
                navigation: {
                    nextEl: ".top-fields-next",
                    prevEl: ".top-fields-prev",
                },
            });

            // Load wards khi thay đổi city
            $("#citySelect").on("change", function () {
                const cityId = $(this).val();
                const $ward = $("#wardSelect");

                $ward.prop("disabled", true).empty();

                if (!cityId) return;

                $.getJSON("/api/v1/wards", {cityId: cityId})
                    .done(function (res) {
                        const wards = Array.isArray(res) ? res : res.data || [];
                        if (wards.length > 0) {
                            wards.forEach((w) =>
                                $ward.append(
                                    `<option value="${w.id}" data-name="${w.slug}">${w.name}</option>`
                                )
                            );
                            $ward.prop("disabled", false);
                        } else {
                            $ward.append("<option disabled>Không có phường/xã</option>");
                        }
                    })
                    .fail(function () {
                        console.error("Không thể tải danh sách phường/xã");
                    });
            });

            function toggleSearchState() {
                var hasCity = $("#citySelect").val();
                var hasType = $("#fieldTypeSelect").val();
                $("#btnSearch").prop("disabled", !(hasCity && hasType));
            }

            $("#citySelect, #fieldTypeSelect").on("change", toggleSearchState);
            toggleSearchState();

            $("#quickSearchForm").on("submit", function (e) {
                e.preventDefault();
                const slug = $("#fieldTypeSelect option:selected").data("slug");
                const qs = $.param({
                    // city: $('#citySelect').find('option:selected').data('name'),
                    ward: $("#wardSelect").find("option:selected").data("name"),
                });
                window.location.href = `/san/${slug}${qs ? "?" + qs : ""}`;
            });

            $("#topFieldTypeFilters").on("click", "button", function () {
                $("#topFieldTypeFilters button").removeClass("active");
                $(this).addClass("active");

                let typeSlug = $(this).data("type")
                if (typeSlug === "") {
                    typeSlug = null;
                }
                loadFields(typeSlug);
            });

            // ===============================
            // Hàm gọi API
            // ===============================
            function loadFields(typeSlug) {
                console.log(typeSlug);
                const apiData = { status: "active" };
                if (typeSlug) {
                    apiData.fieldTypeSlug = typeSlug;
                }
                $.ajax({
                    url: "/api/v1/fields", //
                    type: "GET", //
                    data: apiData,
                    success: function (res) {
                        if (res && res.data) {
                            const fields = res.data.data || [];
                            renderFields(fields);
                        }
                    },
                    error: function () {
                        $("#topFieldsWrapper").html(
                            '<div class="text-center text-danger">Lỗi khi tải sân.</div>'
                        );
                    },
                });
            }

            // ===============================
            // Hàm render danh sách fields
            // ===============================

            function renderFields(fields) {
                const $wrapper = $("#topFieldsWrapper");

                $wrapper.empty();

                if (fields.length === 0) {
                    $wrapper.append(
                        '<div class="text-center w-100">Không có sân phù hợp</div>'
                    );
                } else {
                    fields.forEach((field) => {
                        const banner =
                            field.banner || "/web/img/field/default-field.jpg";
                        const wardName = field.wardResponse
                            ? field.wardResponse.name
                            : "";
                        const rating = field.rating == null ? 4 : field.rating;
                        const openTime = field.openTime || "05:00";
                        const closeTime = field.closeTime || "23:00";
                        const href = `/san/${field.fieldTypeResponse.slug}/${
                            field.slug || ""
                        }`;

                        const slideHtml = `
                    <div class="swiper-slide">
                        <a href="${href}" class="text-decoration-none text-dark">
                        <div class="card h-100">
                            <div class="ratio ratio-16x9 rounded-top bg-light"
                                 style="background: url('${banner}') center/cover no-repeat;">
                            </div>
                            <div class="card-body">
                                <h6 class="card-title mb-1">${field.name}</h6>
                                <div class="mb-1 text-warning fw-semibold">
                                    <i class="bi bi-star-fill"></i> ${rating}
                                </div>
                                <small class="text-muted d-block">
                                    <i class="bi bi-geo-alt"></i> ${wardName}
                                </small>
                                <small class="text-muted d-block">
                                    <i class="bi bi-clock"></i> ${openTime} - ${closeTime}
                                </small>
                            </div>
                        </div>
</a>
                    </div>
                `;
                        $wrapper.append(slideHtml);
                    });
                }

                // Update Swiper và hiển thị slide đầu
                if (window.topFieldsSwiper) {
                    window.topFieldsSwiper.update();
                    window.topFieldsSwiper.slideTo(0, 0);
                }
            }

            // ===============================
            // Load mặc định: tất cả
            // ===============================
            loadFields(null);
        });
    </script>
</section>
</body>
</html>
