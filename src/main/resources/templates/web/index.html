<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/web/web}">
<body>
    <div layout:fragment="content">
        <!-- Hero / Banner with background Swiper and overlayed text -->
        <section class="py-5 bg-light position-relative overflow-hidden" data-aos="fade-up" style="min-height: 420px;">
            <!-- Background Swiper -->
            <div class="position-absolute top-0 start-0 w-100 h-100">
                <div class="swiper hero-swiper w-100 h-100">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide w-100 h-100" style="background:url('/web/img/banner/badminton.png') center/cover no-repeat;"></div>
                        <div class="swiper-slide w-100 h-100" style="background:url('/web/img/banner/football.png') center/cover no-repeat;"></div>
                        <div class="swiper-slide w-100 h-100" style="background:url('/web/img/banner/pickleball.png') center/cover no-repeat;"></div>
                    </div>
                    <div class="swiper-pagination"></div>
                </div>
                <!-- Dark overlay for readability -->
                <div class="position-absolute top-0 start-0 w-100 h-100" style="background: rgba(0,0,0,0.35);"></div>
            </div>

            <!-- Foreground content -->
            <div class="container position-relative" style="z-index: 2;">
                <div class="row">
                    <div class="col-lg-8 col-xl-7">
                        <h1 class="display-5 fw-bold mb-3 text-white">Fisport - Đặt sân thể thao hiện đại</h1>
                        <p class="lead mb-4 text-white-50">Trải nghiệm đặt sân trực tuyến nhanh chóng, mượt mà, phù hợp mọi nhu cầu luyện tập và thi đấu.</p>
                        <div class="d-flex gap-2">
                            <a href="/fields" class="btn btn-primary btn-lg"><i class="bi bi-geo-alt"></i> Tìm sân gần bạn</a>
                            <a href="#promotions" class="btn btn-outline-light btn-lg"><i class="bi bi-lightning"></i> Khám phá ưu đãi</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick search (refined UI/UX) -->
        <section class="py-4 border-bottom" data-aos="fade-up" data-aos-delay="50">
            <div class="container">
                <div class="search-bar bg-white shadow-sm rounded-4 p-3 p-md-4">
                    <form id="quickSearchForm" class="row g-3 g-md-2 align-items-stretch">
                        <div class="col-12 col-md-3">
                            <label for="fieldTypeSelect" class="visually-hidden">Loại sân</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="bi bi-grid"></i></span>
                                <select class="form-select" id="fieldTypeSelect" name="fieldType">
                                    <option selected disabled value="">Chọn loại sân</option>
                                    <option th:each="ft : ${fieldTypes}"
                                            th:value="${ft.id}"
                                            th:text="${ft.name}"
                                            th:attr="data-slug=${ft.slug}">>
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <label for="citySelect" class="visually-hidden">Tỉnh/Thành phố</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                <select class="form-select" id="citySelect" name="city">
                                    <option selected disabled value="">Chọn tỉnh/thành phố</option>
                                    <option th:each="c : ${cities}"
                                            th:value="${c.id}"
                                            th:data-name="${c.slug}"
                                            th:text="${c.name}">
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-md-3">
                            <label for="wardSelect" class="visually-hidden">Phường/Xã</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text"><i class="bi bi-geo"></i></span>
                                <select class="form-select" id="wardSelect" disabled>
                                    <option selected disabled value="">Chọn phường/xã</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-md-2 d-grid">
                            <button type="submit" id="btnSearch" class="btn btn-primary btn-lg btn-search w-100" disabled title="Chọn loại sân và tỉnh/thành phố"><i class="bi bi-search"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </section>

        <!-- Sections placeholders -->
        <section id="promotions" class="py-5" data-aos="fade-up" data-aos-delay="100">
            <div class="container">
                <h2 class="h4 mb-3">Ưu đãi</h2>
                <div class="row g-3">
                    <div class="col-md-4"><div class="p-4 bg-light rounded h-100">Tặng 1 nón thể thao!</div></div>
                    <div class="col-md-4"><div class="p-4 bg-light rounded h-100">Giảm 15% lần đầu</div></div>
                    <div class="col-md-4"><div class="p-4 bg-light rounded h-100">Voucher cuối tuần</div></div>
                </div>
            </div>
        </section>

        <!-- All fields carousel -->
        <section class="py-5" data-aos="fade-up" data-aos-delay="150">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h2 class="h5 mb-0">Tất cả sân thể thao</h2>
                    <div class="d-flex align-items-center gap-2">
                        <div class="btn-group btn-group-sm" role="group" id="topFieldTypeFilters">
                            <!-- Nút Tất cả -->
                            <button type="button"
                            class="btn btn-outline-primary active"
                            data-type="">
                            <i class="fas fa-th-large me-1"></i> Tất cả
                            </button>
                
                            <button type="button"
                                    class="btn btn-outline-primary"
                                    th:each="type : ${fieldTypes}"
                                    th:data-type="${type.slug}"
                                    th:data-id="${type.id}">
                                <i class="me-1"
                                th:classappend="|${type.slug == 'bong-da' ? 'fas fa-futbol' :
                                                    type.slug == 'cau-long' ? 'fas fa-feather-pointed' :
                                                    type.slug == 'tennis' ? 'fas fa-table-tennis-paddle-ball' :
                                                    type.slug == 'bong-ro' ? 'fas fa-basketball' :
                                                    type.slug == 'boi-loi' ? 'fas fa-person-swimming' :
                                                    type.slug == 'pickleball' ? 'fas fa-table-tennis-paddle-ball' :
                                                    'far fa-star'}|"></i>
                                <span th:text="${type.name}"></span>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="swiper top-fields-swiper">
                    <div class="swiper-wrapper" id="topFieldsWrapper">
                                <!-- Lặp qua fields -->
                    <div class="swiper-slide" th:each="field : ${fields}">
                        <div class="card h-100">
                            <!-- Banner của sân hoặc ảnh mặc định -->
                            <div class="ratio ratio-16x9 rounded-top bg-light"
                                th:style="'background: url(' + (${field.banner} != null ? ${field.banner} : '/images/default-field.jpg') + ') center/cover no-repeat;'">
                            </div>
                            <div class="card-body">
                                <h6 class="card-title mb-1" th:text="${field.name}">Tên sân</h6>
                                <small class="text-muted d-block">
                                    <i class="bi bi-geo-alt"></i>
                                    <span th:text="${field.wardResponse.name}">Quận/Huyện</span>
                                </small>
                                <small class="text-muted d-block">
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${field.openTime} + ' - ' + ${field.closeTime}">Giờ mở cửa</span>
                                </small>
                            </div>
                        </div>
                    </div>           
                    <div class="swiper-pagination"></div>
                    <div class="swiper-button-prev"></div>
                    <div class="swiper-button-next"></div>
                </div>
            </div>
        </section>

    </div>
    <section layout:fragment="scripts">
        <script>
        $(document).ready(function() { // đảm bảo jQuery đã load
            

        // 1️⃣ Init Swiper
        var heroSwiper = new Swiper('.hero-swiper', {
            loop: true,
            autoplay: { delay: 3500, disableOnInteraction: false },
            pagination: { el: '.hero-swiper .swiper-pagination', clickable: true }
        });

        var topFieldsSwiper = new Swiper('.top-fields-swiper', {
            loop: false,
            slidesPerView: 5,
            spaceBetween: 20,
            grabCursor: true,
            watchOverflow: true,
            breakpoints: {
                320: { slidesPerView: 1, spaceBetween: 10 },
                576: { slidesPerView: 3, spaceBetween: 14 },
                768: { slidesPerView: 4, spaceBetween: 14 },
                992: { slidesPerView: 5, spaceBetween: 16 },
                1200: { slidesPerView: 5, spaceBetween: 16 }
            },
            pagination: { el: '.top-fields-swiper .swiper-pagination', clickable: true },
            navigation: { nextEl: '.top-fields-swiper .swiper-button-next', prevEl: '.top-fields-swiper .swiper-button-prev' }
        });

        // 2️⃣ Load wards khi thay đổi city
        $('#citySelect').on('change', function() {
            const cityId = $(this).val();
            const $ward = $('#wardSelect');

            $ward.prop('disabled', true).empty();

            if (!cityId) return;

            $.getJSON('/api/v1/wards', { cityId: cityId })
                .done(function(res) {
                    const wards = Array.isArray(res) ? res : res.data || [];
                    if (wards.length > 0) {
                        wards.forEach(w => $ward.append(`<option value="${w.id}" data-name="${w.slug}">${w.name}</option>`));
                        $ward.prop('disabled', false);
                    } else {
                        $ward.append('<option disabled>Không có phường/xã</option>');
                    }
                })
                .fail(function() {
                    console.error('Không thể tải danh sách phường/xã');
                });
        });

        // 3️⃣ Enable search button khi đủ điều kiện
        function toggleSearchState() {
            var hasCity = $('#citySelect').val();
            var hasType = $('#fieldTypeSelect').val();
            $('#btnSearch').prop('disabled', !(hasCity && hasType));
        }
        $('#citySelect, #fieldTypeSelect').on('change', toggleSearchState);
        toggleSearchState();

        // 4️⃣ Quick search form
        $('#quickSearchForm').on('submit', function(e) {
            e.preventDefault();
            const slug = $('#fieldTypeSelect option:selected').data('slug');
            const qs = $.param({
                // city: $('#citySelect').find('option:selected').data('name'),
                ward: $('#wardSelect').find('option:selected').data('name')
            });
            window.location.href = `${slug}${qs ? '?' + qs : ''}`;
        });

        // Load from api
            $('#topFieldTypeFilters').on('click', 'button', function() {
            // active class
            $('#topFieldTypeFilters button').removeClass('active');
            $(this).addClass('active');

            const typeId = $(this).data('id');
            loadFields(typeId);
        });

        // ===============================
        // Hàm gọi API
        // ===============================
        function loadFields(typeId) {
            $('#fieldsGrid').html('<p class="text-center">Đang tải...</p>');

            $.ajax({
                url: '/api/v1/fields',
                type: 'GET',
                data: {
                    typeId: typeId,
                    status: 'active'
                    // wardId, keyword, featureIds không truyền -> mặc định null
                },
                success: function(res) {
                    let fields = res.data || []; // tùy response của bạn
                    renderFields(fields);
                },
                error: function() {
                    $('#fieldsGrid').html('<p class="text-center text-danger">Lỗi khi tải sân.</p>');
                }
            });
        }

        // ===============================
        // Hàm render danh sách fields
        // ===============================
        

        // ===============================
        // Load mặc định: tất cả
        // ===============================
        loadFields(null);

    });
        </script>
    </section>
</body>
</html>
